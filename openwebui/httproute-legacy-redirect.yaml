# 301 redirect for the legacy hostname (chat.k.shion1305.com) so existing
# bookmarks keep working. Matches the keycloak/vault precedent.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openwebui-legacy-redirect
  namespace: openwebui
spec:
  parentRefs:
    - name: external
      namespace: envoy-gateway-system
      sectionName: https-legacy-k
  hostnames:
    - chat.k.shion1305.com
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: chat.shion1305.com
            statusCode: 301
