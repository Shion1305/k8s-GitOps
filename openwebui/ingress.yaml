# Legacy nginx-ssl Ingress kept alongside the new HTTPRoute
# (httproute-external.yaml) so traffic continues to flow while DNS for
# chat.k.shion1305.com still resolves to the nginx-ssl node IP. Once
# DNS is repointed to the envoy-gateway external IP and verified, this
# Ingress can be removed in a follow-up PR.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openwebui
  namespace: openwebui
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx-ssl
  tls:
    - hosts:
        - chat.k.shion1305.com
  rules:
    - host: chat.k.shion1305.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openwebui-open-webui
                port:
                  number: 80
