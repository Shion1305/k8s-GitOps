apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: clearnet-website-monitoring
  namespace: clearnet-website-monitoring
  labels:
    app: clearnet-website-monitoring
    # Required so kube-prometheus-stack's Prometheus picks this up; the
    # release label is the chart's default ServiceMonitorSelector.
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: clearnet-website-monitoring
  namespaceSelector:
    matchNames:
      - clearnet-website-monitoring
  endpoints:
    - port: metrics
      # Match the probe interval — finer scraping just resamples the same
      # snapshot.
      interval: 60s
      scrapeTimeout: 30s
      path: /metrics
      scheme: http
