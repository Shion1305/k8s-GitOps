# SA that the per-namespace SecretStore authenticates to Vault with.
# The Vault role `eso-clearnet-website-monitoring` is bound to this SA +
# namespace (see vault/scripts/setup-eso-policies.sh) and grants read on
# the `clearnet-website-monitoring/` KV v2 mount.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso
  namespace: clearnet-website-monitoring
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault
  namespace: clearnet-website-monitoring
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "clearnet-website-monitoring"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-clearnet-website-monitoring"
          serviceAccountRef:
            name: "eso"
