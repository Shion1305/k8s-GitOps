# Allows Gateways in envoy-gateway-system to route to this namespace's Service.
apiVersion: gateway.networking.k8s.io/v1
kind: ReferenceGrant
metadata:
  name: allow-envoy-gateway
  namespace: clearnet-website-monitoring
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: envoy-gateway-system
  to:
    - group: ""
      kind: Service
