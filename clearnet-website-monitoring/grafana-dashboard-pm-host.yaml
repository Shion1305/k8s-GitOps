apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: clearnet-website-monitoring-pm-host
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: main-grafana
  folderRef: clearnet-website-monitoring
  resyncPeriod: 5m
  json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "panels": [],
          "title": "Host $ip  ($domain)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                { "type": "value", "options": {
                  "2": { "text": "UP", "color": "green", "index": 0 },
                  "1": { "text": "DOWN", "color": "red", "index": 1 },
                  "0": { "text": "DEREG", "color": "orange", "index": 2 }
                }}
              ],
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "orange", "value": null },
                { "color": "red", "value": 1 },
                { "color": "green", "value": 2 }
              ]}
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 5, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "value"
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(provider_monitor_host_state{domain=\"$domain\", ip=\"$ip\"})",
              "instant": true,
              "legendFormat": "state",
              "refId": "A"
            }
          ],
          "title": "Host State",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                { "type": "value", "options": { "0": { "text": "no HTTP", "color": "orange", "index": 0 } } },
                { "type": "range", "options": { "from": 200, "to": 299, "result": { "color": "green", "index": 1 } } },
                { "type": "range", "options": { "from": 300, "to": 399, "result": { "color": "blue", "index": 2 } } },
                { "type": "range", "options": { "from": 400, "to": 599, "result": { "color": "red", "index": 3 } } }
              ],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "text", "value": null } ] }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 5, "x": 5, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "value"
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(provider_monitor_host_http_status{domain=\"$domain\", ip=\"$ip\"})",
              "instant": true,
              "legendFormat": "http",
              "refId": "A"
            }
          ],
          "title": "HTTP Status",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                { "type": "value", "options": {
                  "1": { "text": "MATCH", "color": "green", "index": 0 },
                  "0": { "text": "MISMATCH", "color": "red", "index": 1 }
                }}
              ],
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "red", "value": null },
                { "color": "green", "value": 1 }
              ]}
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 5, "x": 10, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "value"
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(provider_monitor_host_cert_match{domain=\"$domain\", ip=\"$ip\"})",
              "instant": true,
              "legendFormat": "cert",
              "refId": "A"
            }
          ],
          "title": "Cert Match",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "decimals": 1,
              "unit": "d",
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "red", "value": null },
                { "color": "orange", "value": 7 },
                { "color": "yellow", "value": 30 },
                { "color": "green", "value": 60 }
              ]}
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 5, "x": 15, "y": 1 },
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "value"
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "(max(provider_monitor_host_cert_expiry_timestamp{domain=\"$domain\", ip=\"$ip\"}) - time()) / 86400",
              "instant": true,
              "legendFormat": "days left",
              "refId": "A"
            }
          ],
          "title": "Cert Days Left",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "unit": "dateTimeAsIso",
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "text", "value": null } ] }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 1 },
          "id": 5,
          "options": {
            "colorMode": "none",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "value"
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(provider_monitor_last_check_timestamp{domain=\"$domain\"}) * 1000",
              "instant": true,
              "legendFormat": "last check",
              "refId": "A"
            }
          ],
          "title": "Last Check",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": { "fillOpacity": 80, "lineWidth": 0, "insertNulls": false },
              "mappings": [
                { "type": "value", "options": {
                  "2": { "text": "UP", "color": "green", "index": 0 },
                  "1": { "text": "DOWN", "color": "red", "index": 1 },
                  "0": { "text": "DEREG", "color": "orange", "index": 2 }
                }}
              ],
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "orange", "value": null },
                { "color": "red", "value": 1 },
                { "color": "green", "value": 2 }
              ]}
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "http_status" },
                "properties": [
                  {
                    "id": "mappings",
                    "value": [
                      { "type": "value", "options": { "0": { "text": "no HTTP", "color": "orange", "index": 0 } } },
                      { "type": "range", "options": { "from": 200, "to": 299, "result": { "color": "green", "index": 1 } } },
                      { "type": "range", "options": { "from": 300, "to": 399, "result": { "color": "blue", "index": 2 } } },
                      { "type": "range", "options": { "from": 400, "to": 599, "result": { "color": "red", "index": 3 } } }
                    ]
                  }
                ]
              }
            ]
          },
          "gridPos": { "h": 7, "w": 24, "x": 0, "y": 5 },
          "id": 6,
          "options": {
            "alignValue": "left",
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "mergeValues": true,
            "rowHeight": 0.9,
            "showValue": "auto",
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(provider_monitor_host_state{domain=\"$domain\", ip=\"$ip\"})",
              "legendFormat": "host_state",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(provider_monitor_host_http_status{domain=\"$domain\", ip=\"$ip\"})",
              "legendFormat": "http_status",
              "refId": "B"
            }
          ],
          "title": "Host State & HTTP Status Timeline",
          "type": "state-timeline"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "auto",
                "spanNulls": true,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "phash_distance" },
                "properties": [
                  { "id": "custom.axisPlacement", "value": "left" },
                  { "id": "custom.axisLabel", "value": "phash distance" },
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "orange" } },
                  { "id": "custom.thresholdsStyle", "value": { "mode": "line" } },
                  { "id": "thresholds", "value": { "mode": "absolute", "steps": [
                    { "color": "transparent", "value": null },
                    { "color": "red", "value": 10 }
                  ]}}
                ]
              },
              {
                "matcher": { "id": "byName", "options": "text_similarity" },
                "properties": [
                  { "id": "custom.axisPlacement", "value": "right" },
                  { "id": "custom.axisLabel", "value": "text similarity" },
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "blue" } },
                  { "id": "max", "value": 1 },
                  { "id": "min", "value": 0 },
                  { "id": "custom.thresholdsStyle", "value": { "mode": "dashed" } },
                  { "id": "thresholds", "value": { "mode": "absolute", "steps": [
                    { "color": "red", "value": null },
                    { "color": "transparent", "value": 0.7 }
                  ]}}
                ]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 12 },
          "id": 7,
          "options": {
            "legend": { "calcs": ["last", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(provider_monitor_host_phash_distance{domain=\"$domain\", ip=\"$ip\"} != -1)",
              "legendFormat": "phash_distance",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(provider_monitor_host_text_similarity{domain=\"$domain\", ip=\"$ip\"} != -1)",
              "legendFormat": "text_similarity",
              "refId": "B"
            }
          ],
          "title": "Content Drift (phash distance ≥ 10 = change  ·  text similarity < 0.7 = change)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": { "fillOpacity": 80, "lineWidth": 0, "insertNulls": false },
              "mappings": [
                { "type": "value", "options": {
                  "1": { "text": "MATCH", "color": "green", "index": 0 },
                  "0": { "text": "MISMATCH", "color": "red", "index": 1 }
                }}
              ],
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "red", "value": null },
                { "color": "green", "value": 1 }
              ]}
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 12, "x": 0, "y": 20 },
          "id": 8,
          "options": {
            "alignValue": "left",
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": false },
            "mergeValues": true,
            "rowHeight": 0.9,
            "showValue": "auto",
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(provider_monitor_host_cert_match{domain=\"$domain\", ip=\"$ip\"})",
              "legendFormat": "cert_match",
              "refId": "A"
            }
          ],
          "title": "Cert Match Timeline",
          "type": "state-timeline"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "days until expiry",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "auto",
                "spanNulls": true,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "line+area" }
              },
              "unit": "d",
              "decimals": 1,
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "red", "value": null },
                { "color": "orange", "value": 7 },
                { "color": "yellow", "value": 30 },
                { "color": "transparent", "value": 60 }
              ]}
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 12, "x": 12, "y": 20 },
          "id": 9,
          "options": {
            "legend": { "calcs": ["last", "min"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "(max(provider_monitor_host_cert_expiry_timestamp{domain=\"$domain\", ip=\"$ip\"}) - time()) / 86400",
              "legendFormat": "cert days left",
              "refId": "A"
            }
          ],
          "title": "Cert Expiry Countdown",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 25 },
          "id": 101,
          "panels": [],
          "title": "Probe Health  (domain-scoped — probe_* has no ip label)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "errors / interval",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "bars",
                "fillOpacity": 60,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "normal" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] }
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 26 },
          "id": 10,
          "options": {
            "legend": { "calcs": ["sum"], "displayMode": "table", "placement": "right", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "increase(provider_monitor_probe_errors{domain=\"$domain\"}[$__interval])",
              "legendFormat": "{{probe}}",
              "refId": "A"
            }
          ],
          "title": "Probe Errors (increase)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "auto",
                "spanNulls": true,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "unit": "s",
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] }
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 26 },
          "id": 11,
          "options": {
            "legend": { "calcs": ["last", "max"], "displayMode": "table", "placement": "right", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "provider_monitor_probe_duration_seconds{domain=\"$domain\"}",
              "legendFormat": "{{probe}}",
              "refId": "A"
            }
          ],
          "title": "Probe Duration",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": { "align": "auto", "cellOptions": { "type": "auto" }, "inspect": false },
              "mappings": [
                { "type": "value", "options": {
                  "2": { "text": "UP", "color": "green", "index": 0 },
                  "1": { "text": "DOWN", "color": "red", "index": 1 },
                  "0": { "text": "DEREG", "color": "orange", "index": 2 }
                }}
              ],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "text", "value": null } ] }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "state" },
                "properties": [ { "id": "custom.cellOptions", "value": { "type": "color-background" } } ]
              },
              {
                "matcher": { "id": "byName", "options": "http_status" },
                "properties": [
                  { "id": "mappings", "value": [
                    { "type": "value", "options": { "0": { "text": "no HTTP", "color": "orange", "index": 0 } } }
                  ]}
                ]
              },
              {
                "matcher": { "id": "byName", "options": "cert_match" },
                "properties": [
                  { "id": "mappings", "value": [
                    { "type": "value", "options": {
                      "1": { "text": "MATCH", "color": "green", "index": 0 },
                      "0": { "text": "MISMATCH", "color": "red", "index": 1 }
                    }}
                  ]},
                  { "id": "custom.cellOptions", "value": { "type": "color-background" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "phash_distance" },
                "properties": [ { "id": "decimals", "value": 0 } ]
              },
              {
                "matcher": { "id": "byName", "options": "text_similarity" },
                "properties": [ { "id": "decimals", "value": 3 } ]
              },
              {
                "matcher": { "id": "byName", "options": "cert_expiry" },
                "properties": [ { "id": "unit", "value": "dateTimeAsIso" } ]
              }
            ]
          },
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 33 },
          "id": 12,
          "options": {
            "cellHeight": "sm",
            "footer": { "countRows": false, "fields": "", "reducer": ["sum"], "show": false },
            "showHeader": true
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(provider_monitor_host_state{domain=\"$domain\", ip=\"$ip\"})",
              "format": "table",
              "instant": true,
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(provider_monitor_host_http_status{domain=\"$domain\", ip=\"$ip\"})",
              "format": "table",
              "instant": true,
              "refId": "B"
            },
