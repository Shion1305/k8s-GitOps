# Internal Gateway only serves *.i.shion1305.com so the legacy
# atc-prom.k.shion1305.com hostname must be retired with this migration.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: atc-prometheus-internal
  namespace: atc
spec:
  parentRefs:
    - name: internal
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - atc-prom.i.shion1305.com
  rules:
    - backendRefs:
        - name: prometheus
          port: 9090
