apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-mcp
  namespace: atc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-mcp
  template:
    metadata:
      labels:
        app: postgres-mcp
    spec:
      containers:
        - name: postgres-mcp
          image: crystaldba/postgres-mcp:latest
          imagePullPolicy: Always
          # SECURITY: restricted mode (read-only SQL with safety checks).
          # This service injects the shared superuser DSN and is reachable from
          # the openwebui namespace; unrestricted mode made it a write-capable,
          # audit-free path into production data that also bypasses the research
          # holdout law. Follow-up (tracked): a dedicated read-only DB role that
          # excludes market-data tables, and a pinned image tag.
          args:
            - "--transport=sse"
            - "--access-mode=restricted"
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URI
              valueFrom:
                secretKeyRef:
                  name: atc-database-secret
                  key: ATC_DATABASE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-mcp
  namespace: atc
spec:
  type: ClusterIP
  selector:
    app: postgres-mcp
  ports:
    - name: http
      port: 8000
      targetPort: http
