# Internal Gateway only serves *.i.shion1305.com so the legacy
# atc-historical-source*.k.shion1305.com hostnames must be retired with this
# migration. The path-prefix split mirrors the original two-Ingress setup —
# the filer is on port 8888 and the S3 endpoint on port 8333.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: seaweedfs-historical-source-filer-internal
  namespace: atc
spec:
  parentRefs:
    - name: internal
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - atc-historical-source.i.shion1305.com
  rules:
    - backendRefs:
        - name: seaweedfs-historical-source
          port: 8888
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: seaweedfs-historical-source-s3-internal
  namespace: atc
spec:
  parentRefs:
    - name: internal
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - atc-historical-source-s3.i.shion1305.com
  rules:
    - backendRefs:
        - name: seaweedfs-historical-source
          port: 8333
