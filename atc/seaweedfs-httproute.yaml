# Internal Gateway only serves *.i.shion1305.com so the legacy
# atc-historical-source*.k.shion1305.com hostnames are retired with this
# migration. Filer (8888) and S3 (8333) are split across two HTTPRoutes by
# hostname (not path), mirroring the original two-Ingress setup. The old
# nginx Ingress carried `proxy-body-size: 0` and (S3 only) `proxy-request-
# buffering: off` to allow unlimited / streamed uploads. Envoy Gateway does
# not attach a Buffer filter by default — there is no HCM-level body cap to
# replicate — so large uploads stream through unbounded out of the box.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: seaweedfs-historical-source-filer-internal
  namespace: atc
spec:
  parentRefs:
    - name: internal
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - atc-historical-source.i.shion1305.com
  rules:
    - backendRefs:
        - name: seaweedfs-historical-source
          port: 8888
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: seaweedfs-historical-source-s3-internal
  namespace: atc
spec:
  parentRefs:
    - name: internal
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - atc-historical-source-s3.i.shion1305.com
  rules:
    - backendRefs:
        - name: seaweedfs-historical-source
          port: 8333
