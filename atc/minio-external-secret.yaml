apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-historical-source-credentials
  namespace: atc
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault
    kind: SecretStore
  target:
    name: minio-historical-source-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          managed-by: external-secrets
  data:
    - secretKey: MINIO_PASSWORD
      remoteRef:
        key: minio-historical-source
        property: MINIO_PASSWORD
