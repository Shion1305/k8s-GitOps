# Routes TLS connections with SNI=atc.i.shion1305.com on the internal Gateway's
# port 5432 listener to the atc Postgres master Service (operator-generated
# `atc` Service in this namespace). Envoy does not terminate TLS — Spilo presents
# its self-signed cert and the client must connect with sslmode=require (or
# distribute the CA for verify-full).
apiVersion: gateway.networking.k8s.io/v1
kind: TLSRoute
metadata:
  name: atc-postgres
  namespace: postgres-operator-deployment
spec:
  parentRefs:
    - name: internal
      namespace: envoy-gateway-system
      sectionName: tls-passthrough
  hostnames:
    - atc.i.shion1305.com
  rules:
    - backendRefs:
        - name: atc
          port: 5432
