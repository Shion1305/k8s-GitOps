apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio-historical-source
  namespace: atc
  labels:
    app: minio-historical-source
spec:
  serviceName: minio-historical-source
  replicas: 1
  selector:
    matchLabels:
      app: minio-historical-source
  template:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"
      labels:
        app: minio-historical-source
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsNonRoot: true
      containers:
        - name: minio
          image: minio/minio:RELEASE.2026-04-14T21-32-45Z
          command:
            - minio
            - server
            - /data
            - --console-address
            - ":9090"
          env:
            - name: MINIO_ROOT_USER
              value: minio
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-historical-source-credentials
                  key: MINIO_PASSWORD
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9090
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn-hdd
        resources:
          requests:
            storage: 500Gi
