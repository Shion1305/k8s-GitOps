# Internal Gateway only serves *.i.shion1305.com so the legacy
# atc-grafana.k.shion1305.com hostname must be retired with this migration.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: atc-grafana-internal
  namespace: atc
spec:
  parentRefs:
    - name: internal
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - atc-grafana.i.shion1305.com
  rules:
    - backendRefs:
        - name: grafana
          port: 80
