apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: freqtrade-strategy
  namespace: freqtrade
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault
    kind: SecretStore
  target:
    name: freqtrade-strategy
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          managed-by: external-secrets
  dataFrom:
    - extract:
        key: strategy
