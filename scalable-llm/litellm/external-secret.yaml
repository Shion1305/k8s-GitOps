# Materializes the LiteLLM DB credentials (from the operator Secret copied by
# the k8s-postgres SecretStore) into a Secret LiteLLM consumes. The template
# assembles the full DATABASE_URL LiteLLM reads at startup.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-db-credentials
  namespace: scalable-llm
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: k8s-postgres
    kind: SecretStore
  target:
    name: litellm-db-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          managed-by: external-secrets
      data:
        DATABASE_URL: "postgresql://{{ .username | urlquery }}:{{ .password | urlquery }}@postgres-shared.postgres-operator-deployment.svc.cluster.local:5432/litellm"
  data:
    - secretKey: username
      remoteRef:
        key: litellm.postgres-shared.credentials.postgresql.acid.zalan.do
        property: username
    - secretKey: password
      remoteRef:
        key: litellm.postgres-shared.credentials.postgresql.acid.zalan.do
        property: password
