apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso
  namespace: scalable-llm
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault
  namespace: scalable-llm
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      # Dedicated KV v2 mount: vault secrets enable -path=scalable-llm kv-v2
      path: "scalable-llm"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-scalable-llm"
          serviceAccountRef:
            name: "eso"
---
# LiteLLM master key (admin/virtual-key signing). Written to Vault out-of-band
# (public repo — never commit the value):
#   vault kv put scalable-llm/litellm master_key=sk-<random>
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-master-key
  namespace: scalable-llm
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault
    kind: SecretStore
  target:
    name: litellm-master-key
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          managed-by: external-secrets
  data:
    - secretKey: LITELLM_MASTER_KEY
      remoteRef:
        key: litellm
        property: master_key
