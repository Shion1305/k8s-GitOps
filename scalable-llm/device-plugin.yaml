# Phase 3 (方式A): expose Tenstorrent Blackhole to the scheduler.
#
# No official Tenstorrent device plugin exists, so squat/generic-device-plugin
# advertises each Blackhole card as its own allocatable unit. The node has two
# p150a cards, so it advertises squat.io/tenstorrent: 2; a Pod that requests
# `squat.io/tenstorrent: 1` gets ONE card injected. tt-inference-server has no
# 2-card (p150x2) mesh for this model — Llama-3.1-8B runs single-card (p150) and
# fits one card's 32GB — so each model replica uses one card, and the two cards
# back up to two independent replicas. The DaemonSet only runs on
# shion-ubuntu-2605 (the labelled TT node); other nodes have no cards.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: tenstorrent-device-plugin
  namespace: scalable-llm
  labels:
    app: tenstorrent-device-plugin
spec:
  selector:
    matchLabels:
      app: tenstorrent-device-plugin
  template:
    metadata:
      labels:
        app: tenstorrent-device-plugin
    spec:
      priorityClassName: system-node-critical
      nodeSelector:
        tenstorrent.com/blackhole: "true" # = shion-ubuntu-2605 only
      tolerations:
        - operator: "Exists" # tolerate any taint the TT node may carry
      containers:
        - name: generic-device-plugin
          # ghcr.io/squat/generic-device-plugin publishes commit-hash tags; this
          # is the digest-pinnable tag. Renovate keeps it current.
          image: ghcr.io/squat/generic-device-plugin:latest
          args:
            # generic-device-plugin defaults its resource domain to "devic.es";
            # pin it to squat.io so the advertised name is squat.io/tenstorrent,
            # matching the resourceProfile limits/requests in kubeai-values.yaml.
            - --domain
            - squat.io
            - --device
            - |
              name: tenstorrent
              groups:
                # Each group is one allocatable unit = one card. Two groups → the
                # node advertises squat.io/tenstorrent: 2. A Pod requesting 1 gets
                # exactly one card's device file injected.
                - paths:
                    - path: /dev/tenstorrent/0
                - paths:
                    - path: /dev/tenstorrent/1
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 10Mi
            limits:
              cpu: 50m
              memory: 20Mi
          securityContext:
            privileged: true # device-plugin needs to mknod the device files
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            - name: dev
              mountPath: /dev
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: dev
          hostPath:
            path: /dev
