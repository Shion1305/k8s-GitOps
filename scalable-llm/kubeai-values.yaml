# KubeAI controller config for the Tenstorrent Blackhole PoC.
# Rendered by the scalable-llm ArgoCD app (Helm source, skipCrds=true).
# The models.kubeai.org CRD is owned by the kube-ai-crd app.

# Single-replica controller; this is a PoC on one TT node.
replicaCount: 1

# Istio / Knative / Prometheus-adapter are not used. Default messaging off.

# The KubeAI chart bundles an Open WebUI subchart, enabled by default. This
# cluster already runs Open WebUI as its own `openwebui` app, so disable the
# bundled one to avoid a duplicate StatefulSet/PVC/Service in this namespace.
open-webui:
  enabled: false

resourceProfiles:
  # The one profile this PoC uses. A Model references it as
  # `resourceProfile: tenstorrent-blackhole:1`, where `1` = one allocation
  # unit = one Blackhole p150a card (see device-plugin.yaml; the node advertises
  # squat.io/tenstorrent: 2, one per card).
  tenstorrent-blackhole:
    imageName: "tt-vllm" # -> modelServers.VLLM.images.tt-vllm below
    nodeSelector:
      # Pins every TT model Pod to shion-ubuntu-2605, the only node with cards.
      # Label applied in Phase 1-3: kubectl label node shion-ubuntu-2605 \
      #   tenstorrent.com/blackhole=true
      tenstorrent.com/blackhole: "true"
    limits:
      # Must match the resource name advertised by device-plugin.yaml exactly.
      # One unit = one p150a card handed to a single vLLM instance.
      squat.io/tenstorrent: "1"
    requests:
      squat.io/tenstorrent: "1"
      cpu: "4"
      # The model weights load into the CARD's VRAM, not host RAM — a running
      # replica uses only ~3.3Gi of node memory (measured via kubectl top). The
      # old 32Gi request was ~10x reality and blocked a 2nd replica from
      # scheduling (2×32Gi > the node's ~52Gi). 8Gi gives ample headroom and lets
      # both p150a cards run a replica for horizontal scale.
      memory: "8Gi"
    # shion-ubuntu-2605 carries no TT-specific taint today. If one is added,
    # mirror it here (confirm with `kubectl describe node shion-ubuntu-2605`):
    # tolerations:
    #   - key: "<taint-key>"
    #     operator: "Exists"
    #     effect: "NoSchedule"

modelServers:
  VLLM:
    images:
      # Official tt-inference-server vLLM image (TT-Metal source release). Public
      # on ghcr; serves an OpenAI-compatible API on :8000 for Llama-3.1-8B on a
      # single p150 via the image entrypoint. Pinned; bump deliberately.
      tt-vllm: "ghcr.io/tenstorrent/tt-inference-server/vllm-tt-metal-src-release-ubuntu-22.04-amd64:0.10.0-555f240-22be241"
      # `default` is required by the chart even though we never schedule on it.
      default: "ghcr.io/tenstorrent/tt-inference-server/vllm-tt-metal-src-release-ubuntu-22.04-amd64:0.10.0-555f240-22be241"

# Applied to every model server Pod. Because the only resourceProfile in this
# PoC pins Pods to shion-ubuntu-2605, these patches only ever land on the TT
# node. They attach the TT compile/program cache and the device directory.
modelServerPods:
  # The TT image is built so its files (tt-metal, logs, app) are owned by
  # container_app_user (uid 1000), even though its default USER is root. KubeAI
  # drops ALL caps, which also drops CAP_DAC_OVERRIDE — so the default root user
  # loses its permission-bypass and the engine crashes with "Permission denied"
  # creating tt-metal/generated and logs/generated.
  #
  # Run as the image's own uid 1000 instead: it owns those dirs, so no extra cap
  # is needed and the container stays non-root with ALL caps dropped (tighter
  # than re-adding DAC_OVERRIDE to root). The hostPath cache must then be
  # writable by uid 1000 — done out-of-band on the host (see README):
  #   sudo chown -R 1000:1000 /var/local-storage/tt-cache
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  # NOTE: `add /spec/volumes/-` (append) requires spec.volumes to already exist.
  # KubeAI's vLLM engine always adds a `dshm` volume + the server container's
  # volumeMount, so both arrays exist on every model Pod and these appends are
  # valid. KubeAI *ignores invalid patches silently* — if a future chart drops
  # dshm, the cache mount would vanish without error. Re-check on chart bumps.
  jsonPatches:
    # Node-local hostPath cache for TT-Metal program/kernel compilation +
    # downloaded/converted weights. Persisting this across Pod restarts and
    # scale-from-zero is what keeps cold starts from re-compiling (Phase 2 / R4).
    # The cache lives on shion-ubuntu-2605 only; pre-create the dir on the host:
    #   sudo mkdir -p /var/local-storage/tt-cache && sudo chmod 1777 /var/local-storage/tt-cache
    - op: add
      path: /spec/volumes/-
      value:
        name: tt-cache
        hostPath:
          path: /var/local-storage/tt-cache
          type: DirectoryOrCreate
    - op: add
      path: /spec/containers/0/volumeMounts/-
      value:
        name: tt-cache
        # TT_CACHE_PATH / CACHE_ROOT on the Model point here (models/tt-llama.yaml).
        mountPath: /cache/tt
    # HugePages: TT-Metal maps 1G hugetlbfs. The host enables it via tt-installer;
    # the official image binds /dev/hugepages-1G specifically.
    - op: add
      path: /spec/volumes/-
      value:
        name: hugepages-1g
        hostPath:
          path: /dev/hugepages-1G
          type: Directory
    - op: add
      path: /spec/containers/0/volumeMounts/-
      value:
        name: hugepages-1g
        mountPath: /dev/hugepages-1G
    # HF_TOKEN for the gated Llama-3.1-8B weight download, from the ESO-synced
    # Secret (Vault scalable-llm/llama → llama-hf-token). The model Pod downloads
    # weights on first start and persists them in the tt-cache hostPath.
    - op: add
      path: /spec/containers/0/env/-
      value:
        name: HF_TOKEN
        valueFrom:
          secretKeyRef:
            name: llama-hf-token
            key: HF_TOKEN
    # Run the vLLM server in the TT fork's venv. KubeAI sets the container
    # command to `python3 -m vllm.entrypoints.openai.api_server`, but that picks
    # the base interpreter where vllm is not importable (ModuleNotFoundError).
    # The tenstorrent/vllm fork lives in ${PYTHON_ENV_DIR}; source it, then exec
    # the same module. KubeAI's generated args (--model, --served-model-name,
    # --max-num-seqs=32) are appended by the chart and arrive as "$@".
    - op: replace
      path: /spec/containers/0/command
      value:
        - bash
        - -lc
        - 'source ${PYTHON_ENV_DIR}/bin/activate && exec python -m vllm.entrypoints.openai.api_server "$@"'
        - "vllm-tt" # $0 for `bash -c`; KubeAI's args follow as "$@"
    # FALLBACK (commented): if the device-plugin device files are not enough
    # and the TT runtime needs /dev/tenstorrent/by-id or sysfs/PCIe resources,
    # promote the container to privileged with the whole device dir. Not for
    # production — try the device-plugin path (squat.io/tenstorrent) first.
    # - op: add
    #   path: /spec/containers/0/securityContext/privileged
    #   value: true
    # - op: add
    #   path: /spec/volumes/-
    #   value:
    #     name: tt-dev
    #     hostPath: { path: /dev/tenstorrent, type: Directory }
    # - op: add
    #   path: /spec/containers/0/volumeMounts/-
    #   value:
    #     name: tt-dev
    #     mountPath: /dev/tenstorrent

# The controller itself does not need the TT node; let it schedule anywhere.
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi
