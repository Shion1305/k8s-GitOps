# 301 redirect for the legacy hostname (github-readme-stats.k.shion1305.com)
# so existing GitHub README image links keep working. Matches the
# keycloak/vault precedent.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: github-readme-stats-legacy-redirect
  namespace: github-readme-stats
spec:
  parentRefs:
    - name: external
      namespace: envoy-gateway-system
      sectionName: https-legacy-k
  hostnames:
    - github-readme-stats.k.shion1305.com
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: github-readme-stats.shion1305.com
            statusCode: 301
