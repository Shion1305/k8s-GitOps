# Legacy nginx-ssl Ingress kept alongside the new HTTPRoute
# (httproute-external.yaml) so traffic continues to flow while DNS for
# github-readme-stats.k.shion1305.com still resolves to the nginx-ssl
# node IP. Once DNS is repointed to the envoy-gateway external IP and
# verified, this Ingress can be removed in a follow-up PR.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: github-readme-stats
  namespace: github-readme-stats
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx-ssl
  tls:
    - hosts:
        - github-readme-stats.k.shion1305.com
      secretName: github-readme-stats-tls
  rules:
    - host: github-readme-stats.k.shion1305.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: github-readme-stats
                port:
                  number: 9000
