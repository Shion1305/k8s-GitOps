apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-readme-stats
  namespace: github-readme-stats
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault
    kind: SecretStore
  target:
    name: github-readme-stats
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          managed-by: external-secrets
  data:
    - secretKey: PAT_1
      remoteRef:
        key: github-token
        property: PAT_1
