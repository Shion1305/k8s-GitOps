apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
  annotations:
    # Sync after postgres-shared (default wave 0) so the `harbor` user/DB
    # exist before Harbor core tries to connect. Without this, the first
    # sync still converges via Pod CrashLoopBackOff retries (see
    # other Helm-backed apps for the no-wave precedent), but waving avoids the
    # noisy startup window.
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - repoURL: https://helm.goharbor.io
      chart: harbor
      targetRevision: 1.19.1
      helm:
        valueFiles:
          - $values/harbor/values.yaml
    - repoURL: https://github.com/Shion1305/k8s-GitOps.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/Shion1305/k8s-GitOps.git
      targetRevision: HEAD
      path: harbor
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
