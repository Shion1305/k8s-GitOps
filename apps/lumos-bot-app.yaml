apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lumos-bot
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Shion1305/k8s-GitOps.git
    targetRevision: HEAD
    path: lumos-bot
  destination:
    server: https://kubernetes.default.svc
    namespace: lumos-bot
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
