apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: scalable-llm
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: scalable-llm
  # The card-arbiter (scalable-llm/card-arbiter) evicts an idle model to free a
  # Tenstorrent card for a waiting model by pinning that Model's minReplicas AND
  # maxReplicas to 0 (KubeAI clamps max before min, so min must drop too or a warm
  # holder re-clamps back up; KubeAI then rewrites replicas). These fields are
  # managed live at runtime, so exclude them from self-heal — otherwise ArgoCD
  # reverts the patch within seconds and the arbiter can never free a card. The
  # git values stay the normal-operation bounds the arbiter restores to.
  ignoreDifferences:
    - group: kubeai.org
      kind: Model
      jqPathExpressions:
        - '.spec.minReplicas'
        - '.spec.maxReplicas'
        - '.spec.replicas'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
    # 1) KubeAI controller (Helm, version-pinned). The CRD is owned by the
    #    kube-ai-crd app (sync-wave -1), so skip it here to avoid a collision.
    - repoURL: https://www.kubeai.org
      chart: kubeai
      targetRevision: 0.23.2
      helm:
        skipCrds: true
        valueFiles:
          - $values/scalable-llm/kubeai-values.yaml
    # 2) Self-authored manifests: namespace, generic-device-plugin DaemonSet,
    #    Model CRs, LiteLLM front, ESO/DB/Vault wiring, HTTPRoute. The KubeAI
    #    Helm release does not own these.
    - repoURL: https://github.com/Shion1305/k8s-GitOps.git
      targetRevision: HEAD
      path: scalable-llm
      ref: values
