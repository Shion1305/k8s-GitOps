apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: buildkit
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Shion1305/k8s-GitOps.git
    targetRevision: HEAD
    path: buildkit
  destination:
    server: https://kubernetes.default.svc
    namespace: buildkit
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
