apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 86.2.3
      helm:
        valueFiles:
          - $values/grafana/values.yaml
    - repoURL: https://github.com/Shion1305/k8s-GitOps.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/Shion1305/k8s-GitOps.git
      targetRevision: HEAD
      path: grafana
  destination:
    server: https://kubernetes.default.svc
    namespace: grafana
  # grafana-operator writes spec.version back into the CR and the embedded
  # ServicePort defaults protocol=TCP; the node-exporter ServiceMonitor's
  # job-pin relabeling gets action=replace defaulted by the operator. None are
  # in the repo manifests, so ArgoCD diffs them forever. Per-app because these
  # fields carry real intent on other Grafana / ServiceMonitor objects.
  ignoreDifferences:
    - group: grafana.integreatly.org
      kind: Grafana
      jqPathExpressions:
        - '.spec.version'
        - '.spec.service.spec.ports[].protocol'
    - group: monitoring.coreos.com
      kind: ServiceMonitor
      name: kube-prometheus-stack-prometheus-node-exporter
      jqPathExpressions:
        - '.spec.endpoints[].relabelings[].action'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
