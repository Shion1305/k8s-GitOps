apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflare-monitoring
  namespace: argocd
spec:
  project: default
  sources:
    # Cloudflare Exporter
    - repoURL: https://lablabs.github.io/cloudflare-exporter
      chart: cloudflare-exporter
      targetRevision: 0.2.3
      helm:
        releaseName: cloudflare-exporter
        valueFiles:
          - $values/cloudflare-exporter/values.yaml
    # Values reference
    - repoURL: https://github.com/Shion1305/k8s-GitOps.git
      targetRevision: HEAD
      ref: values
    # Additional resources (ServiceMonitor, Ingress)
    - repoURL: https://github.com/Shion1305/k8s-GitOps.git
      targetRevision: HEAD
      path: cloudflare-exporter
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  # The grafana-operator writes the running version back into spec.version, and
  # the embedded ServicePort defaults protocol=TCP — neither is in the repo CR,
  # so ArgoCD diffs them forever. Per-app because spec.version is operator-owned.
  ignoreDifferences:
    - group: grafana.integreatly.org
      kind: Grafana
      jqPathExpressions:
        - '.spec.version'
        - '.spec.service.spec.ports[].protocol'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
