apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: clearnet-website-monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Shion1305/k8s-GitOps.git
    targetRevision: HEAD
    path: clearnet-website-monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: clearnet-website-monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
