# Cloudflare Exporter Helm Values
# Exposes Cloudflare metrics for Prometheus monitoring
# Deployment configuration
replicaCount: 1
image:
  repository: lablabs/cloudflare_exporter
  tag: "latest" # Specify working version
  pullPolicy: IfNotPresent
# Environment variables - credentials loaded from secret
env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: cloudflare-credentials
        key: CF_API_TOKEN
# Service configuration
service:
  type: ClusterIP
  port: 8080
  # Note: prometheus.io/scrape is added by the chart via
  # `addPrometheusScrapeAnnotation: true` (default). Re-adding it here
  # produces a duplicate map key that fails strict YAML/JSON validation.
  annotations:
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
# Resource limits
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
# Monitoring configuration
serviceMonitor:
  # We use the standalone ServiceMonitor in servicemonitor.yaml instead — chart-rendered SM has wrong selector.
  enabled: false
# Security context
securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
