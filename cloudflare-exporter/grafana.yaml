apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: cloudflare-grafana
  namespace: monitoring
  labels:
    dashboards: cloudflare-grafana
spec:
  config:
    server:
      root_url: "https://ynufes-cf.k.shion1305.com/"
      serve_from_sub_path: "false"
    auth.anonymous:
      enabled: "false"
    # auth.basic must remain enabled (the default) so grafana-operator can
    # authenticate to /api via the admin credentials it manages. The login
    # form is hidden via auth.disable_login_form below — interactive users
    # still go through Keycloak OIDC.
    auth:
      disable_login_form: "true"
      disable_signout_menu: "false"
      oauth_auto_login: "true"
    auth.generic_oauth:
      enabled: "true"
      name: Keycloak
      allow_sign_up: "true"
      client_id: cloudflare-grafana
      # File-based to avoid leaking the client secret through the Pod env.
      # The Secret is produced by ESO from Vault (cloudflare-grafana/keycloak-client)
      # and mounted at /etc/grafana/secrets via the deployment override below.
      client_secret: $__file{/etc/grafana/secrets/clientsecret}
      scopes: openid email profile groups
      # OIDC realm is `ynufes-tech` (replaces the legacy `grafana` realm).
      # Authentication is GitHub OAuth via Keycloak's IdP; group-to-role
      # mapping is performed below via role_attribute_path.
      auth_url: https://keycloak.shion1305.com/realms/ynufes-tech/protocol/openid-connect/auth
      token_url: https://keycloak.shion1305.com/realms/ynufes-tech/protocol/openid-connect/token
      api_url: https://keycloak.shion1305.com/realms/ynufes-tech/protocol/openid-connect/userinfo
      role_attribute_path: contains(groups[*], 'grafana-admin') && 'Admin' || contains(groups[*], 'grafana-editor') && 'Editor' || 'Viewer'
    security:
      admin_user: admin
  deployment:
    spec:
      template:
        spec:
          containers:
            - name: grafana
              resources:
                limits:
                  cpu: 500m
                  memory: 512Mi
                requests:
                  cpu: 250m
                  memory: 256Mi
              volumeMounts:
                - name: oauth-client-secret
                  mountPath: /etc/grafana/secrets
                  readOnly: true
          volumes:
            - name: oauth-client-secret
              secret:
                secretName: cloudflare-grafana-oauth
  service:
    metadata: {}
    spec:
      type: NodePort
      ports:
        - port: 3000
          targetPort: 3000
          nodePort: 30081
  persistentVolumeClaim:
    spec:
      accessModes:
        - ReadWriteOnce
      storageClassName: longhorn-hdd
      resources:
        requests:
          storage: 5Gi
