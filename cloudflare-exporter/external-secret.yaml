apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-grafana-oauth
  namespace: monitoring
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault
    kind: SecretStore
  target:
    name: cloudflare-grafana-oauth
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          managed-by: external-secrets
  data:
    - secretKey: clientsecret
      remoteRef:
        key: keycloak-client
        property: clientsecret
