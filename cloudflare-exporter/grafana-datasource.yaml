apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: cloudflare-grafana
  datasource:
    # Pin a stable UID so dashboard JSONs can reference this datasource by
    # name. Without this, grafana-operator assigns a random UUID on first
    # apply and dashboards lose their datasource link.
    uid: prometheus
    name: Prometheus
    type: prometheus
    access: proxy
    url: http://kube-prometheus-stack-prometheus.grafana.svc.cluster.local:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 30s
      queryTimeout: 60s
