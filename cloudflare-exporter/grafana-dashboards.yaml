apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cloudflare-overview
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: cloudflare-grafana
  folderRef: cloudflare-monitoring
  resyncPeriod: 5m
  json: |
    {
      "title": "Cloudflare 概要 (月次サマリ)",
      "uid": "cloudflare-overview",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "graphTooltip": 1,
      "tags": ["cloudflare", "quota", "overview"],
      "time": { "from": "now-30d", "to": "now" },
      "refresh": "5m",
      "timepicker": {
        "refresh_intervals": ["1m", "5m", "15m", "30m", "1h"],
        "time_options": ["24h", "7d", "30d", "90d"]
      },
      "templating": {
        "list": [
          {
            "name": "account",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(cloudflare_worker_requests_count, account)",
            "refresh": 2,
            "multi": false,
            "includeAll": false,
            "label": "アカウント"
          }
        ]
      },
      "annotations": { "list": [] },
      "panels": [
        {
          "type": "text",
          "id": 100,
          "transparent": true,
          "gridPos": { "h": 5, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "## Cloudflare 概要ダッシュボード\n\nCloudflare の課金サイクルは **1 ヶ月** です。このダッシュボードは選択期間 (デフォルト: 過去30日) の利用量を、Free / Paid 各プランの月間枠と比較して表示します。\n\n**色の意味**: 緑 = 余裕 / 黄 = 50% 超過 / 橙 = 80% 超過 (Paid 課金圏内) / 赤 = 100% 到達\n\n詳しく見るには: [Workers 詳細](/d/cloudflare-workers) ・ [R2 詳細](/d/cloudflare-r2)"
          }
        },
        {
          "type": "row",
          "id": 1,
          "title": "Workers (サーバーレス実行)",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "collapsed": false
        },
        {
          "type": "stat",
          "id": 110,
          "title": "Workers リクエスト数 (期間合計)",
          "description": "選択期間内に Worker が呼び出された総回数。Free 月間 300万 / Paid 月間 1,000万 が上限です。",
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(cloudflare_worker_requests_count{account=\"$account\"}[$__range]))"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "" },
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "value",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1500000 },
                  { "color": "orange", "value": 3000000 },
                  { "color": "red", "value": 10000000 }
                ]
              }
            }
          }
        },
        {
          "type": "gauge",
          "id": 111,
          "title": "Free 月間枠の消費率",
          "description": "(期間リクエスト数) ÷ 3,000,000 (Free 月間枠 = 100,000 req/日 × 30 日)。100% で Free 上限に到達。",
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(cloudflare_worker_requests_count{account=\"$account\"}[$__range])) / 3000000"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "" },
            "showThresholdMarkers": true,
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "orange", "value": 0.8 },
                  { "color": "red", "value": 1.0 }
                ]
              }
            }
          }
        },
        {
          "type": "gauge",
          "id": 112,
          "title": "Paid 月間枠の消費率",
          "description": "(期間リクエスト数) ÷ 10,000,000 (Paid 月間枠)。100% を超えると $0.30 / 100万 req の超過課金。",
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(cloudflare_worker_requests_count{account=\"$account\"}[$__range])) / 10000000"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "" },
            "showThresholdMarkers": true,
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "decimals": 4,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "orange", "value": 0.8 },
                  { "color": "red", "value": 1.0 }
                ]
              }
            }
          }
        },
        {
          "type": "row",
          "id": 2,
          "title": "R2 (オブジェクトストレージ)",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 12 },
          "collapsed": false
        },
        {
          "type": "stat",
          "id": 210,
          "title": "R2 合計容量",
          "description": "全バケット合計の使用容量。Free 枠は 10 GB まで。",
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 13 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(cloudflare_r2_storage_total_bytes{account=\"$account\"})"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "" },
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "value",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "decbytes",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5368709120 },
                  { "color": "orange", "value": 8589934592 },
                  { "color": "red", "value": 10737418240 }
                ]
              }
            }
          }
        },
        {
          "type": "gauge",
          "id": 211,
          "title": "容量 Free 枠の消費率",
          "description": "(合計容量) ÷ 10 GB。100% で Free 上限到達、Paid は超過分 $0.015 / GB-月。",
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 13 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(cloudflare_r2_storage_total_bytes{account=\"$account\"}) / (10 * 1024 * 1024 * 1024)"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "" },
            "showThresholdMarkers": true,
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "decimals": 4,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "orange", "value": 0.8 },
                  { "color": "red", "value": 1.0 }
                ]
              }
            }
          }
        },
        {
          "type": "gauge",
          "id": 212,
          "title": "Class A 書込み Free 枠の消費率",
          "description": "(期間内 Class A 操作数) ÷ 1,000,000。Paid 超過は $4.50 / 100万 req。",
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 13 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(cloudflare_r2_operation_count{account=\"$account\", operation=~\"PutObject|CopyObject|ListObjects|ListBuckets|PutBucket|CompleteMultipartUpload|CreateMultipartUpload|LifecycleStorageTierTransition|ListMultipartUploads|UploadPart|UploadPartCopy|ListParts|PutBucketEncryption|PutBucketCors|PutBucketLifecycleConfiguration\"}[$__range])) / 1000000"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "" },
            "showThresholdMarkers": true,
            "orientation": "auto",
            "noValue": "0%"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "decimals": 4,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "orange", "value": 0.8 },
                  { "color": "red", "value": 1.0 }
                ]
              }
            }
          }
        },
        {
          "type": "gauge",
          "id": 213,
          "title": "Class B 読込み Free 枠の消費率",
          "description": "(期間内 Class B 操作数) ÷ 10,000,000。Paid 超過は $0.36 / 100万 req。",
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 13 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(cloudflare_r2_operation_count{account=\"$account\", operation=~\"GetObject|HeadObject|HeadBucket|UsageSummary|GetBucketEncryption|GetBucketLocation|GetBucketCors|GetBucketLifecycleConfiguration\"}[$__range])) / 10000000"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "" },
            "showThresholdMarkers": true,
            "orientation": "auto",
            "noValue": "0%"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "decimals": 4,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "orange", "value": 0.8 },
                  { "color": "red", "value": 1.0 }
                ]
              }
            }
          }
        }
      ]
    }
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cloudflare-workers
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: cloudflare-grafana
  folderRef: cloudflare-monitoring
  resyncPeriod: 5m
  json: |
    {
      "title": "Cloudflare Workers 詳細",
      "uid": "cloudflare-workers",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "graphTooltip": 1,
      "tags": ["cloudflare", "workers"],
      "time": { "from": "now-30d", "to": "now" },
      "refresh": "5m",
      "timepicker": {
        "refresh_intervals": ["30s", "1m", "5m", "15m", "30m", "1h"],
        "time_options": ["24h", "7d", "30d", "90d"]
      },
      "templating": {
        "list": [
          {
            "name": "account",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(cloudflare_worker_requests_count, account)",
            "refresh": 2,
            "multi": false,
            "includeAll": false,
            "label": "アカウント"
          },
          {
            "name": "script",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(cloudflare_worker_requests_count{account=\"$account\"}, script_name)",
            "refresh": 2,
            "multi": true,
            "includeAll": true,
            "label": "Worker スクリプト"
          }
        ]
      },
      "annotations": { "list": [] },
      "panels": [
        {
          "type": "text",
          "id": 100,
          "transparent": true,
          "gridPos": { "h": 4, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "## Workers 詳細\n\nCloudflare Workers (サーバーレス実行) の使用状況を、料金プランの上限と比較しながら詳細に見ます。\n\n**料金プラン**: Free = 100,000 req/日, 1 req あたり CPU 10ms / Paid = 月間 1,000万 req + CPU 3,000万 ms 込み, 1 req あたり CPU 最大 30秒\n\n[← 概要に戻る](/d/cloudflare-overview)"
          }
        },
        {
          "type": "row",
          "id": 1,
          "title": "リクエスト数",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 4 },
          "collapsed": false
        },
        {
          "type": "stat",
          "id": 110,
          "title": "過去24時間のリクエスト数",
          "description": "直近24時間の総リクエスト数。Free プランの 100,000 req/日 が上限。",
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(cloudflare_worker_requests_count{account=\"$account\", script_name=~\"$script\"}[24h]))"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "" },
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "value",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50000 },
                  { "color": "orange", "value": 100000 },
                  { "color": "red", "value": 333333 }
                ]
              }
            }
          }
        },
        {
          "type": "gauge",
          "id": 111,
          "title": "Free 日次枠の消費率",
          "description": "(過去24時間) ÷ 100,000",
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(cloudflare_worker_requests_count{account=\"$account\", script_name=~\"$script\"}[24h])) / 100000"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "" },
            "showThresholdMarkers": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit", "min": 0, "max": 1, "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "orange", "value": 0.8 },
                  { "color": "red", "value": 1.0 }
                ]
              }
            }
          }
        },
        {
          "type": "stat",
          "id": 112,
          "title": "選択期間のリクエスト総数",
          "description": "右上の時間範囲のリクエスト総数。デフォルトは過去30日 (月間枠目安)。",
          "gridPos": { "h": 5, "w": 6, "x": 12, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(cloudflare_worker_requests_count{account=\"$account\", script_name=~\"$script\"}[$__range]))"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "" },
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "value",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1500000 },
                  { "color": "orange", "value": 3000000 },
                  { "color": "red", "value": 10000000 }
                ]
              }
            }
          }
        },
        {
          "type": "gauge",
          "id": 113,
          "title": "Paid 月間枠の消費率",
          "description": "(選択期間リクエスト数) ÷ 10,000,000",
          "gridPos": { "h": 5, "w": 6, "x": 18, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(cloudflare_worker_requests_count{account=\"$account\", script_name=~\"$script\"}[$__range])) / 10000000"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "" },
            "showThresholdMarkers": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit", "min": 0, "max": 1, "decimals": 4,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "orange", "value": 0.8 },
                  { "color": "red", "value": 1.0 }
                ]
              }
            }
          }
        },
        {
          "type": "timeseries",
          "id": 120,
          "title": "スクリプトごとのリクエスト処理レート (req/sec)",
          "description": "Worker スクリプトごとに、1 秒あたり何回呼び出されているかを時系列で表示します。",
          "gridPos": { "h": 9, "w": 16, "x": 0, "y": 10 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (script_name) (rate(cloudflare_worker_requests_count{account=\"$account\", script_name=~\"$script\"}[5m]))",
              "legendFormat": "{{script_name}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "decimals": 3,
              "custom": { "lineWidth": 2, "fillOpacity": 10, "showPoints": "never" }
            }
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean", "max", "sum"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "type": "stat",
          "id": 121,
          "title": "選択期間のエラー率",
          "description": "(エラー数) ÷ (リクエスト数)。1% で黄、5% で赤。",
          "gridPos": { "h": 9, "w": 8, "x": 16, "y": 10 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(cloudflare_worker_errors_count{account=\"$account\", script_name=~\"$script\"}[$__range])) / clamp_min(sum(increase(cloudflare_worker_requests_count{account=\"$account\", script_name=~\"$script\"}[$__range])), 1)"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "" },
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "value",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 3,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "red", "value": 0.05 }
                ]
              }
            }
          }
        },
        {
          "type": "row",
          "id": 2,
          "title": "1 回あたりの CPU 時間",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 19 },
          "collapsed": false
        },
        {
          "type": "text",
          "id": 102,
          "transparent": true,
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 20 },
          "options": {
            "mode": "markdown",
            "content": "**Free = 10ms 上限 (黄ライン) / Paid デフォルト = 30,000 ms (30秒, 赤ライン)**。P99 が 10ms を超えると Free では実行不可、30 秒に近づくと Paid でもタイムアウト警告レベル。"
          }
        },
        {
          "type": "timeseries",
          "id": 220,
          "title": "CPU 時間 P50 / P99 の推移 (ms)",
          "description": "中央値 (P50) と上位 1% 遅さ (P99)。閾値線は Free 10ms / Paid 30s。",
          "gridPos": { "h": 10, "w": 16, "x": 0, "y": 23 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "max by (script_name) (cloudflare_worker_cpu_time{account=\"$account\", script_name=~\"$script\", quantile=\"P99\"}) / 1000",
              "legendFormat": "P99 — {{script_name}}"
            },
            {
              "refId": "B",
              "expr": "max by (script_name) (cloudflare_worker_cpu_time{account=\"$account\", script_name=~\"$script\", quantile=\"P50\"}) / 1000",
              "legendFormat": "P50 — {{script_name}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "decimals": 2,
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 5,
                "showPoints": "never",
                "thresholdsStyle": { "mode": "line" }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "transparent", "value": null },
                  { "color": "yellow", "value": 10 },
                  { "color": "red", "value": 30000 }
                ]
              }
            }
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "right", "calcs": ["lastNotNull", "max"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "type": "bargauge",
          "id": 221,
          "title": "スクリプト別 P99 CPU時間 (最新値, ms)",
          "description": "10 ms / 30,000 ms を基準にしたスクリプトごとの直近 P99 値。",
          "gridPos": { "h": 10, "w": 8, "x": 16, "y": 23 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "max by (script_name) (cloudflare_worker_cpu_time{account=\"$account\", script_name=~\"$script\", quantile=\"P99\"}) / 1000",
              "legendFormat": "{{script_name}}",
              "instant": true
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "" },
            "displayMode": "gradient",
            "orientation": "horizontal",
            "showUnfilled": true,
            "valueMode": "color"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "min": 0,
              "max": 30000,
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "orange", "value": 10 },
                  { "color": "red", "value": 30000 }
                ]
              }
            }
          }
        }
      ]
    }
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cloudflare-r2
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: cloudflare-grafana
  folderRef: cloudflare-monitoring
  resyncPeriod: 5m
  json: |
    {
      "title": "Cloudflare R2 詳細",
      "uid": "cloudflare-r2",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "graphTooltip": 1,
      "tags": ["cloudflare", "r2"],
      "time": { "from": "now-30d", "to": "now" },
      "refresh": "5m",
      "timepicker": {
        "refresh_intervals": ["1m", "5m", "15m", "30m", "1h"],
        "time_options": ["24h", "7d", "30d", "90d"]
      },
      "templating": {
        "list": [
          {
            "name": "account",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(cloudflare_r2_storage_total_bytes, account)",
            "refresh": 2,
            "multi": false,
            "includeAll": false,
            "label": "アカウント"
          }
        ]
      },
      "annotations": { "list": [] },
      "panels": [
        {
          "type": "text",
          "id": 100,
          "transparent": true,
          "gridPos": { "h": 4, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "## R2 詳細\n\nCloudflare R2 オブジェクトストレージの使用状況を、料金プランと比較しながら詳細に見ます。\n\n**料金プラン**: Free = ストレージ 10 GB / Class A 月 100万 req / Class B 月 1,000万 req / Paid = 上記超過分のみ課金 (詳細は下記)\n\n[← 概要に戻る](/d/cloudflare-overview)"
          }
        },
        {
          "type": "row",
          "id": 1,
          "title": "ストレージ容量",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 4 },
          "collapsed": false
        },
        {
          "type": "text",
          "id": 101,
          "transparent": true,
          "gridPos": { "h": 2, "w": 24, "x": 0, "y": 5 },
          "options": {
            "mode": "markdown",
            "content": "**上限**: Free = 10 GB まで無料 / Paid = 超過分 $0.015 / GB-月 (Standard ストレージのみ)"
          }
        },
        {
          "type": "stat",
          "id": 210,
          "title": "R2 合計容量",
          "description": "全バケットの合計使用容量。Free 枠 10 GB に対して色付け。",
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 7 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(cloudflare_r2_storage_total_bytes{account=\"$account\"})"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "" },
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "value",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "decbytes",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5368709120 },
                  { "color": "orange", "value": 8589934592 },
                  { "color": "red", "value": 10737418240 }
                ]
              }
            }
          }
        },
        {
          "type": "gauge",
          "id": 211,
          "title": "Free 容量枠の消費率",
          "description": "(合計容量) ÷ 10 GB",
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 7 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(cloudflare_r2_storage_total_bytes{account=\"$account\"}) / (10 * 1024 * 1024 * 1024)"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "" },
            "showThresholdMarkers": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit", "min": 0, "max": 1, "decimals": 4,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "orange", "value": 0.8 },
                  { "color": "red", "value": 1.0 }
                ]
              }
            }
          }
        },
        {
          "type": "bargauge",
          "id": 212,
          "title": "バケット別の使用容量",
          "description": "バケットごとの使用容量。バー上限は 10 GB (Free 枠 1 つ分)。",
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 7 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "cloudflare_r2_storage_bytes{account=\"$account\"}",
              "legendFormat": "{{bucket}}",
              "instant": true
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "" },
            "displayMode": "gradient",
            "orientation": "horizontal",
            "showUnfilled": true,
            "valueMode": "color"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "decbytes",
              "min": 0,
              "max": 10737418240,
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1073741824 },
                  { "color": "orange", "value": 5368709120 },
                  { "color": "red", "value": 10737418240 }
                ]
              }
            }
          }
        },
        {
          "type": "row",
          "id": 2,
          "title": "読み書きオペレーション数",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 13 },
          "collapsed": false
        },
        {
          "type": "text",
          "id": 102,
          "transparent": true,
          "gridPos": { "h": 4, "w": 24, "x": 0, "y": 14 },
          "options": {
            "mode": "markdown",
            "content": "R2 操作は **Class A (書込み系)** と **Class B (読込み系)** に分類されます。\n\n- **Class A (1M req/月まで無料, 超過 $4.50/100万)**: `PutObject`, `CopyObject`, `ListObjects`, multipart 関連, バケット設定書込みなど\n- **Class B (10M req/月まで無料, 超過 $0.36/100万)**: `GetObject`, `HeadObject`, `HeadBucket`, バケット設定読込みなど\n- **無料 (どちらにも計上されない)**: `DeleteObject`, `DeleteBucket`, `AbortMultipartUpload`"
          }
        },
        {
          "type": "stat",
          "id": 310,
          "title": "Class A (書込み) 操作数",
          "description": "選択期間の Class A 操作合計。Free 月間 100万 req まで無料。",
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 18 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(cloudflare_r2_operation_count{account=\"$account\", operation=~\"PutObject|CopyObject|ListObjects|ListBuckets|PutBucket|CompleteMultipartUpload|CreateMultipartUpload|LifecycleStorageTierTransition|ListMultipartUploads|UploadPart|UploadPartCopy|ListParts|PutBucketEncryption|PutBucketCors|PutBucketLifecycleConfiguration\"}[$__range]))"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "" },
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "value",
            "justifyMode": "center",
            "noValue": "0"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 500000 },
                  { "color": "orange", "value": 1000000 },
                  { "color": "red", "value": 5000000 }
                ]
              }
            }
          }
        },
        {
          "type": "gauge",
          "id": 311,
          "title": "Class A Free 枠の消費率",
          "description": "(Class A 操作数) ÷ 1,000,000",
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 18 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(cloudflare_r2_operation_count{account=\"$account\", operation=~\"PutObject|CopyObject|ListObjects|ListBuckets|PutBucket|CompleteMultipartUpload|CreateMultipartUpload|LifecycleStorageTierTransition|ListMultipartUploads|UploadPart|UploadPartCopy|ListParts|PutBucketEncryption|PutBucketCors|PutBucketLifecycleConfiguration\"}[$__range])) / 1000000"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "" },
            "showThresholdMarkers": true,
            "noValue": "0%"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit", "min": 0, "max": 1, "decimals": 4,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "orange", "value": 0.8 },
                  { "color": "red", "value": 1.0 }
                ]
              }
            }
          }
        },
        {
          "type": "stat",
          "id": 312,
          "title": "Class B (読込み) 操作数",
          "description": "選択期間の Class B 操作合計。Free 月間 1,000万 req まで無料。",
          "gridPos": { "h": 5, "w": 6, "x": 12, "y": 18 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(cloudflare_r2_operation_count{account=\"$account\", operation=~\"GetObject|HeadObject|HeadBucket|UsageSummary|GetBucketEncryption|GetBucketLocation|GetBucketCors|GetBucketLifecycleConfiguration\"}[$__range]))"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "" },
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "value",
            "justifyMode": "center",
            "noValue": "0"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5000000 },
                  { "color": "orange", "value": 10000000 },
                  { "color": "red", "value": 50000000 }
                ]
              }
            }
          }
        },
        {
          "type": "gauge",
          "id": 313,
          "title": "Class B Free 枠の消費率",
          "description": "(Class B 操作数) ÷ 10,000,000",
          "gridPos": { "h": 5, "w": 6, "x": 18, "y": 18 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(cloudflare_r2_operation_count{account=\"$account\", operation=~\"GetObject|HeadObject|HeadBucket|UsageSummary|GetBucketEncryption|GetBucketLocation|GetBucketCors|GetBucketLifecycleConfiguration\"}[$__range])) / 10000000"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "" },
            "showThresholdMarkers": true,
            "noValue": "0%"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit", "min": 0, "max": 1, "decimals": 4,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "orange", "value": 0.8 },
                  { "color": "red", "value": 1.0 }
                ]
              }
            }
          }
        },
        {
          "type": "timeseries",
          "id": 320,
          "title": "操作タイプ別の発生レート (ops/sec)",
          "description": "R2 操作の種類別に、1 秒あたり何回発生しているかを時系列で表示。",
          "gridPos": { "h": 9, "w": 24, "x": 0, "y": 23 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (operation) (rate(cloudflare_r2_operation_count{account=\"$account\"}[5m]))",
              "legendFormat": "{{operation}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "decimals": 3,
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "stacking": { "mode": "normal" }
              }
            }
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean", "max", "sum"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        }
      ]
    }
