# 301 redirect for the legacy hostname (ynufes-cf.k.shion1305.com) so existing
# bookmarks keep working. Matches the keycloak/vault precedent.
#
# The Keycloak `ynufes-tech` realm's `cloudflare-grafana` client redirectUris
# in keycloak-operator/ynufes-tech-realm.yaml have been flipped to the apex
# hostname. NOTE: KeycloakRealmImport uses the `Create` strategy by default
# and does not re-import an already-existing realm, so this change won't
# apply automatically — the redirectUris must be updated manually in the
# Keycloak admin UI (realm `ynufes-tech` → Clients → `cloudflare-grafana`)
# before this PR's apex HTTPRoute is exercised.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cloudflare-grafana-legacy-redirect
  namespace: monitoring
spec:
  parentRefs:
    - name: external
      namespace: envoy-gateway-system
      sectionName: https-legacy-k
  hostnames:
    - ynufes-cf.k.shion1305.com
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: ynufes-cf.shion1305.com
            statusCode: 301
