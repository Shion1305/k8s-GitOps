# Renovate Helm Chart Values
# Official chart: https://github.com/renovatebot/helm-charts

# CronJob configuration
cronjob:
  enabled: true
  schedule: "0 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  # Override command to use wrapper script
  commandOverride:
    - /bin/bash
    - /scripts/run-renovate.sh

# Use existing secret created manually
existingSecret: "renovate-secret"

# Extra volumes for wrapper script
extraVolumes:
  - name: scripts
    configMap:
      name: renovate-scripts
      defaultMode: 0755

extraVolumeMounts:
  - name: scripts
    mountPath: /scripts

extraObjects:
  - apiVersion: batch/v1
    kind: CronJob
    metadata:
      name: renovate-bug-discussion-41912
    spec:
      schedule: "0 * * * *"
      suspend: true
      concurrencyPolicy: Forbid
      failedJobsHistoryLimit: 1
      successfulJobsHistoryLimit: 1
      jobTemplate:
        metadata:
          labels:
            app.kubernetes.io/name: renovate
            app.kubernetes.io/instance: renovate
        spec:
          template:
            metadata:
              labels:
                app.kubernetes.io/name: renovate
                app.kubernetes.io/instance: renovate
            spec:
              serviceAccountName: renovate
              restartPolicy: Never
              containers:
                - name: renovate
                  image: "ghcr.io/renovatebot/renovate:43.99.0"
                  imagePullPolicy: IfNotPresent
                  command:
                    - /bin/bash
                    - /scripts/run-bug-discussion-41912.sh
                  volumeMounts:
                    - name: config-volume
                      mountPath: /usr/src/app/config.json
                      subPath: config.json
                    - mountPath: /scripts
                      name: scripts
                  env:
                    - name: RENOVATE_CONFIG_FILE
                      value: /usr/src/app/config.json
                    - name: "LOG_LEVEL"
                      value: "debug"
                    - name: "RENOVATE_AUTODISCOVER"
                      value: "false"
                  envFrom:
                    - secretRef:
                        name: renovate-secret
                  resources:
                    limits:
                      cpu: 2000m
                      memory: 2Gi
                    requests:
                      cpu: 200m
                      memory: 512Mi
              volumes:
                - name: config-volume
                  configMap:
                    name: renovate-config
                - configMap:
                    defaultMode: 0755
                    name: renovate-scripts
                  name: scripts
              securityContext:
                fsGroup: 1000
                runAsNonRoot: true
                runAsUser: 1000
                seccompProfile:
                  type: RuntimeDefault

# Environment variables
env:
  LOG_LEVEL: "info"

# Renovate configuration
# Docs: https://docs.renovatebot.com/self-hosted-configuration/
renovate:
  # Main configuration as JSON string
  config: |
    {
      "extends": [
        "github>aquaproj/aqua-renovate-config#2.10.0"
      ],
      "platform": "github",
      "autodiscover": true,
      "autodiscoverFilter": ["Shion1305/*", "*/*"],
      "onboarding": true,
      "requireConfig": "optional",
      "gitAuthor": "Automation by Shion1305 <bot@github.shion.pro>",
      "username": "renovate-by-shion1305[bot]",
      "repositories": [],
      "ignorePaths": [],
      "enabledManagers": [
        "argocd",
        "docker-compose",
        "dockerfile",
        "github-actions",
        "helm",
        "helm-values",
        "helmfile",
        "kubernetes",
        "kustomize",
        "custom.regex",
        "gomod",
        "npm",
        "pnpm",
        "pnpm-lock",
        "cargo",
        "pip_requirements",
        "pip_setup",
        "poetry",
        "maven",
        "gradle",
        "nuget",
        "bundler",
        "composer",
        "terraform",
        "ansible"
      ],
      "packageRules": [
        {
          "description": "Exclude archived repositories",
          "matchRepositories": ["**"],
          "enabled": true
        }
      ],
      "prConcurrentLimit": 10,
      "prHourlyLimit": 2,
      "timezone": "UTC"
    }

# Resource limits
resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 200m
    memory: 512Mi

# Pod configuration
securityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# Service account
serviceAccount:
  create: true
  name: renovate
