# proxpi -- a lightweight pull-through PyPI proxy that caches wheels in-cluster.
#
# WHY (and why not a plain nginx proxy): PyPI's simple API returns ABSOLUTE wheel
# URLs on files.pythonhosted.org, so a naive reverse-proxy of just the index host
# would serve the index but let the client fetch wheels straight from PyPI --
# uncached. proxpi rewrites those file URLs to route through itself
# (/index/<pkg>/<file>) and caches the bytes, which is exactly what makes the
# cache effective. devpi does the same but has no official image and needs
# index/user init; proxpi is a single Flask/gunicorn process purpose-built for
# this, so it's the minimal fit.
#
# WHO USES IT: this repo's CI runner image (crypto-auto-trading-ci) bakes
# UV_DEFAULT_INDEX=http://proxpi.pypi-cache.svc.cluster.local:5000/index/ , so
# `uv sync` resolves + downloads wheels through here with ZERO per-repo workflow
# edits. Lockfile integrity is preserved: proxpi returns byte-identical upstream
# wheels, so the hashes pinned in uv.lock still match. First fetch of a wheel goes
# to PyPI (WAN) and is cached to the PVC; every subsequent pull -- across pods and
# across CI jobs -- is served from the LAN.
#
# This is a NEW, self-contained component. It does NOT touch the shared
# github-actions-runner config; runner pods reach it as an ordinary in-cluster
# Service (their namespace has no egress default-deny blocking it).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxpi
  namespace: pypi-cache
  labels:
    app.kubernetes.io/name: proxpi
spec:
  replicas: 1
  # Single writer against a node-local cache; never run two proxpi pods.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: proxpi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: proxpi
    spec:
      # Co-locate with the shion1305-amd GARM runners: the only amd64 nodes are
      # the home nodes, so this keeps proxpi on the home LAN, off the cross-site
      # OCI nodes, without pinning a hostname.
      nodeSelector:
        kubernetes.io/arch: amd64
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: proxpi
          # Pinned by digest (epicwink/proxpi:latest at time of writing). Docker
          # Hub is the only distribution channel for this image; a Harbor
          # docker.io proxy-cache project could front it later, but the digest
          # pin already makes the pull reproducible.
          image: epicwink/proxpi:1.3.0
          imagePullPolicy: IfNotPresent
          args:
            - --bind
            - 0.0.0.0:5000
            - --threads
            # proxpi's Gunicorn process has one worker by default.  Downloads
            # are I/O-bound, but cap request concurrency at requests/urllib3's
            # default per-host keep-alive pool size to avoid excessive upstream
            # connection churn during cold-cache bursts.
            - "10"
            - --no-control-socket
          env:
            # Cache dir on the node-local cache volume.
            - name: PROXPI_CACHE_DIR
              value: /var/cache/proxpi
            # LRU ceiling in bytes; keep below the emptyDir sizeLimit so proxpi
            # evicts before the kubelet does. 16 GiB.
            - name: PROXPI_CACHE_SIZE
              value: "17179869184"
            # Re-check the simple index this often (seconds). 30 min balances
            # picking up new releases against hammering PyPI for the index.
            - name: PROXPI_INDEX_TTL
              value: "1800"
          ports:
            - name: http
              containerPort: 5000
          volumeMounts:
            - name: cache
              mountPath: /var/cache/proxpi
            # Gunicorn creates a per-worker temporary file at startup.  The
            # container filesystem is intentionally read-only, so provide a
            # writable ephemeral /tmp without weakening that hardening.
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            # Do not send the only endpoint NotReady merely because all
            # Gunicorn threads are busy serving large wheels. A TCP probe
            # verifies that proxpi is accepting connections without competing
            # with package downloads for an application worker.
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            # The HTTP /health handler uses the same single Gunicorn worker as
            # downloads. Under a CI thundering herd it can time out even though
            # proxpi is healthy, causing kubelet to kill the only cache Pod.
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        # The wheel cache is a disposable warm-up (losing it just re-fetches from
        # PyPI once), so it uses a node-local emptyDir rather than longhorn: keeps
        # every read on proxpi's own node instead of across the home WireGuard
        # link. Node disk, not medium: Memory. sizeLimit > PROXPI_CACHE_SIZE.
        - name: cache
          emptyDir:
            sizeLimit: 20Gi
        - name: tmp
          emptyDir: {}
