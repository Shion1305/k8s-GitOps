apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: discord-token
  namespace: lumos-bot
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault
    kind: SecretStore
  target:
    name: discord-token
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          managed-by: external-secrets
  dataFrom:
    - extract:
        key: DiscordToken
