# Routes the Pushgateway's token-validity series to the DEDICATED long-term
# Prometheus (prometheus.yaml), away from the size-capped primary.
#
# The `monitoring-tier: dedicated` label is a GENERIC opt-out, not gh-leaked-
# tokens-specific:
#   * the primary kube-prometheus-stack EXCLUDES any ServiceMonitor carrying it
#     (serviceMonitorSelector NotIn [dedicated] in grafana/values.yaml), so the
#     primary never scrapes — and never size-evicts — this audit data;
#   * the dedicated Prometheus INCLUDES it, scoped to this namespace via its
#     serviceMonitorNamespaceSelector, so it doesn't also pick up some other
#     team's `monitoring-tier: dedicated` SM in a different namespace.
# Any future workload wanting its own retention reuses the same label + a
# dedicated instance; no edit to the primary is ever needed again.
#
# honorLabels: true is REQUIRED for a Pushgateway. The recheck job pushes series
# with its own `job="gh_token_recheck"` and per-spec/instance labels (see
# metrics.py grouping keys). Without honorLabels, Prometheus would overwrite
# those with the scrape target's job/instance and collapse every token's series
# together. honorLabels keeps the pushed identity intact.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gh-leaked-tokens-pushgateway
  namespace: gh-leaked-tokens
  labels:
    app: gh-leaked-tokens-pushgateway
    monitoring-tier: dedicated
spec:
  selector:
    matchLabels:
      app: gh-leaked-tokens-pushgateway
  namespaceSelector:
    matchNames:
      - gh-leaked-tokens
  endpoints:
    - port: metrics
      interval: 60s
      scrapeTimeout: 30s
      path: /metrics
      scheme: http
      honorLabels: true
