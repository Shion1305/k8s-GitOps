# Tells the DEDICATED long-term Prometheus (prometheus.yaml) to scrape the
# Pushgateway. The label is `prometheus: gh-leaked-tokens`, which that instance's
# serviceMonitorSelector matches exactly.
#
# IMPORTANT: the primary kube-prometheus-stack uses an EMPTY serviceMonitorSelector
# (`{}`), so it would scrape this SM regardless of labels. The label alone does NOT
# keep the primary off this data. What actually excludes it is the primary's
# serviceMonitorNamespaceSelector, set to NotIn [gh-leaked-tokens] in
# grafana/values.yaml. Both pieces are required: this label routes the data to the
# dedicated instance, and that namespace exclusion keeps the size-capped primary
# from also scraping (and eventually evicting) the audit trail.
#
# honorLabels: true is REQUIRED for a Pushgateway. The recheck job pushes series
# with its own `job="gh_token_recheck"` and per-spec/instance labels (see
# metrics.py grouping keys). Without honorLabels, Prometheus would overwrite
# those with the scrape target's job/instance and collapse every token's series
# together. honorLabels keeps the pushed identity intact.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gh-leaked-tokens-pushgateway
  namespace: gh-leaked-tokens
  labels:
    app: gh-leaked-tokens-pushgateway
    prometheus: gh-leaked-tokens
spec:
  selector:
    matchLabels:
      app: gh-leaked-tokens-pushgateway
  namespaceSelector:
    matchNames:
      - gh-leaked-tokens
  endpoints:
    - port: metrics
      interval: 60s
      scrapeTimeout: 30s
      path: /metrics
      scheme: http
      honorLabels: true
