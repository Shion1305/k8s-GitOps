# Tells the DEDICATED long-term Prometheus (prometheus.yaml) to scrape the
# Pushgateway. The label is `prometheus: gh-leaked-tokens`, NOT the usual
# `release: kube-prometheus-stack` — that is deliberate: the primary
# kube-prometheus-stack is size-capped and would evict this audit data, so we
# route token validity to the dedicated instance ONLY. The dedicated
# Prometheus' serviceMonitorSelector matches exactly this label.
#
# honorLabels: true is REQUIRED for a Pushgateway. The recheck job pushes series
# with its own `job="gh_token_recheck"` and per-spec/instance labels (see
# metrics.py grouping keys). Without honorLabels, Prometheus would overwrite
# those with the scrape target's job/instance and collapse every token's series
# together. honorLabels keeps the pushed identity intact.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gh-leaked-tokens-pushgateway
  namespace: gh-leaked-tokens
  labels:
    app: gh-leaked-tokens-pushgateway
    prometheus: gh-leaked-tokens
spec:
  selector:
    matchLabels:
      app: gh-leaked-tokens-pushgateway
  namespaceSelector:
    matchNames:
      - gh-leaked-tokens
  endpoints:
    - port: metrics
      interval: 60s
      scrapeTimeout: 30s
      path: /metrics
      scheme: http
      honorLabels: true
