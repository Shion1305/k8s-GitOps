# Allow shared-Postgres clients (:5432) and the operator's Patroni REST API
# (:8008). Scoped to the postgres-shared cluster; the atc cluster has its own
# policy in atc/. Additive ingress allow.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-to-postgres-shared
  namespace: postgres-operator-deployment
spec:
  endpointSelector:
    matchLabels:
      cluster-name: postgres-shared
  enableDefaultDeny:
    ingress: false
    egress: false
  ingress:
    - fromEndpoints:
        - matchExpressions:
            - key: k8s:io.kubernetes.pod.namespace
              operator: In
              values:
                - adminer
                - fde-knowledge-engine
                - gh-leaked-tokens
                - grafana
                - harbor
                - keycloak
                - langfuse
                - mlflow
                - nc-press-chotatsu
                - openwebui
                - postgres-operator
                - scalable-llm
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: postgres-operator
      toPorts:
        - ports:
            - port: "8008"
              protocol: TCP
