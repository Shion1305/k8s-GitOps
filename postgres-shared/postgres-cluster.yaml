apiVersion: "acid.zalan.do/v1"
kind: postgresql
metadata:
  name: postgres-shared
  namespace: postgres-operator-deployment
spec:
  teamId: "default"
  volume:
    size: 1Ti
    storageClass: longhorn-ssd
  numberOfInstances: 1
  users:
    openwebui: []
    langfuse: []
    keycloak: []
    mlflow: []
    nc_press_chotatsu: []
    harbor: []
    litellm: [] # LiteLLM front for scalable-llm (KubeAI on Tenstorrent)
    fde_knowledge_engine: []
    research_gh_leaks: []
  databases:
    openwebui: openwebui
    langfuse: langfuse
    keycloak: keycloak
    mlflow: mlflow
    nc_press_chotatsu: nc_press_chotatsu
    harbor: harbor
    litellm: litellm
    fde_knowledge_engine: fde_knowledge_engine
    research_gh_leaks: research_gh_leaks
  postgresql:
    version: "17"
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  patroni:
    pg_hba:
      - local all all trust
      - host all all 0.0.0.0/0 md5
      - hostssl all all 0.0.0.0/0 md5
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - shion-ubuntu-2505
