# =============================================================================
# Keycloak Realm Import: zot
# =============================================================================
#
# This file is reconciled by the Keycloak Operator (KeycloakRealmImport CRD).
# It declares the `zot` realm used to authenticate human users to the zot
# registry Web UI and to mint pull tokens for in-cluster workloads:
#   - Browser login flow runs through Envoy Gateway's `SecurityPolicy.oidc`
#     (zot/securitypolicy.yaml), which performs the Authorization Code flow
#     against this realm using the `zot-ui` confidential client below and
#     forwards the Keycloak access token upstream as `Authorization:
#     Bearer ...` (forwardAccessToken: true).
#   - In-cluster image pulls (kubelet imagePullSecrets) and manual
#     `docker login` from WireGuard hosts use the `cluster-puller`
#     service-account client below (grant_type=client_credentials). ESO's
#     ClusterGenerator (zot-pull/cluster-generator.yaml) calls Keycloak's
#     token endpoint and templates a dockerconfigjson Secret named
#     `zot-pull` into every namespace labelled `zot-pull/enabled=true`.
#   - zot's `http.auth.bearer.oidc[]` validates the access tokens issued by
#     this realm (audience = `zot-registry`) and authorizes via the
#     `groups` claim.
#
# GitHub Actions does NOT pass through Keycloak. CI/CD workflows present
# their own GitHub OIDC token directly to zot at `registry.shion1305.com`,
# which validates it via a second `bearer.oidc[]` entry trusting
# `https://token.actions.githubusercontent.com`. Token-exchange and the
# previous `gha-exchanger` client / `github-actions` IdP have been retired.
#
# -----------------------------------------------------------------------------
# Manual post-import steps (one-time, after first successful sync):
# -----------------------------------------------------------------------------
# 1. Retrieve the auto-generated client secret for the `zot-registry` client
#    from the Keycloak admin UI:
#      https://keycloak.shion1305.com -> realm `zot` -> Clients -> zot-registry
#      -> Credentials -> "Client secret".
#    The placeholder `PLACEHOLDER_REPLACE_AFTER_REALM_IMPORT` declared below is
#    overwritten by Keycloak on first import; subsequent reconciles do not
#    re-apply the placeholder.
#
# 2. Repeat for `zot-ui` and `cluster-puller`, then persist all three into
#    Vault (the zot/cluster-puller path is read by ESO via the
#    `eso-cluster-puller` Vault role; see vault/scripts/setup-eso-policies.sh):
#      vault kv put zot/keycloak-client clientsecret=<zot-ui-secret>
#      vault kv put zot/cluster-puller \
#        client_id=cluster-puller \
#        client_secret=<cluster-puller-secret>
#
# 3. Bind the Browser authentication flow to "Identity Provider Redirector"
#    pinned to alias `user`, so human web logins skip the choice screen and go
#    straight to the `user` realm (passkey-only):
#      Authentication -> Flows -> Browser -> add "Identity Provider Redirector"
#      execution at the top, Required, with config
#      `Default Identity Provider = user`. Bind that flow as the realm's
#      Browser flow. This step is not declarative on the v2alpha1 CRD.
#
# 4. Assign the `zot-admin` / `pusher-shion1305` / `pusher-shion1305dev`
#    groups to the appropriate users (after first-broker-login from the `user`
#    realm). This is per-user state and lives in Keycloak, not git.
#
# -----------------------------------------------------------------------------
# Realm recreation (when YAML changes need to take effect):
# -----------------------------------------------------------------------------
# `KeycloakRealmImport` is one-shot reconcile; subsequent edits are silently
# ignored once the realm exists. To apply changes:
#   kubectl delete keycloakrealmimport zot -n keycloak
#   # admin UI: realm `zot` -> Realm Settings -> Action -> Delete
# ArgoCD then recreates the import CR; the operator reimports.
# WARNING: this drops federated-identity links and group memberships for
# every brokered user; re-run step 4 above for each affected user.
# =============================================================================
apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: zot
  namespace: keycloak
spec:
  keycloakCRName: keycloak
  realm:
    realm: zot
    enabled: true
    registrationAllowed: false
    # `external` = HTTPS required for any non-loopback request. Cluster-internal
    # plaintext (Pod IP, ClusterIP) still satisfies this because traffic is TLS-
    # terminated at Envoy Gateway and the `xforwarded` proxy headers config on
    # the Keycloak CR makes Keycloak treat `X-Forwarded-Proto: https` requests
    # as HTTPS.
    sslRequired: external

    # -------------------------------------------------------------------------
    # Realm roles. zot's accessControl policy keys off the `groups` claim in
    # the JWT (groups carry their associated realmRole into the claim).
    # -------------------------------------------------------------------------
    roles:
      realm:
        - name: zot-admin
          description: Full admin (read/create/update/delete) on all repositories in zot
        - name: pusher-shion1305
          description: Push/pull on shion1305/** repositories
        - name: pusher-shion1305dev
          description: Push/pull on shion1305dev/** repositories

    # -------------------------------------------------------------------------
    # Groups mirror the realm roles. The group-membership mapper on each
    # client emits the group name into the JWT `groups` claim, which zot's
    # accessControl uses for authorization.
    # -------------------------------------------------------------------------
    groups:
      - name: zot-admin
        realmRoles:
          - zot-admin
      - name: pusher-shion1305
        realmRoles:
          - pusher-shion1305
      - name: pusher-shion1305dev
        realmRoles:
          - pusher-shion1305dev

    # -------------------------------------------------------------------------
    # Client scopes
    # -------------------------------------------------------------------------
    # When a realm is imported with a non-empty `clientScopes` list, Keycloak
    # uses it as the COMPLETE set of scopes for the realm and skips the
    # auto-seeded built-ins. So we have to declare every scope we want -- both
    # the OIDC built-ins (`profile`, `email`, `roles`, `web-origins`, `acr`,
    # `basic`) and our custom `groups`.
    defaultDefaultClientScopes:
      - basic
      - profile
      - email
      - roles
      - web-origins
      - acr
      - groups
    defaultOptionalClientScopes: []
    clientScopes:
      - name: basic
        description: "OpenID Connect scope for add all basic claims to the token"
        protocol: openid-connect
        attributes:
          include.in.token.scope: "false"
          display.on.consent.screen: "false"
        protocolMappers:
          - name: sub
            protocol: openid-connect
            protocolMapper: oidc-sub-mapper
            config:
              access.token.claim: "true"
              introspection.token.claim: "true"
          - name: auth_time
            protocol: openid-connect
            protocolMapper: oidc-usersessionmodel-note-mapper
            config:
              user.session.note: "AUTH_TIME"
              id.token.claim: "true"
              access.token.claim: "true"
              introspection.token.claim: "true"
              claim.name: "auth_time"
              jsonType.label: "long"

      - name: profile
        description: "OpenID Connect built-in scope: profile"
        protocol: openid-connect
        attributes:
          include.in.token.scope: "true"
          display.on.consent.screen: "true"
          consent.screen.text: "${profileScopeConsentText}"
        protocolMappers:
          - name: full name
            protocol: openid-connect
            protocolMapper: oidc-full-name-mapper
            config:
              id.token.claim: "true"
              access.token.claim: "true"
              userinfo.token.claim: "true"
              introspection.token.claim: "true"
          - name: family name
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            config:
              user.attribute: "lastName"
              id.token.claim: "true"
              access.token.claim: "true"
              userinfo.token.claim: "true"
              introspection.token.claim: "true"
              claim.name: "family_name"
              jsonType.label: "String"
          - name: given name
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            config:
              user.attribute: "firstName"
              id.token.claim: "true"
              access.token.claim: "true"
              userinfo.token.claim: "true"
              introspection.token.claim: "true"
              claim.name: "given_name"
              jsonType.label: "String"
          - name: username
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            config:
              user.attribute: "username"
              id.token.claim: "true"
              access.token.claim: "true"
              userinfo.token.claim: "true"
              introspection.token.claim: "true"
              claim.name: "preferred_username"
              jsonType.label: "String"
          - name: locale
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            config:
              user.attribute: "locale"
              id.token.claim: "true"
              access.token.claim: "true"
              userinfo.token.claim: "true"
              introspection.token.claim: "true"
              claim.name: "locale"
              jsonType.label: "String"

      - name: email
        description: "OpenID Connect built-in scope: email"
        protocol: openid-connect
        attributes:
          include.in.token.scope: "true"
          display.on.consent.screen: "true"
          consent.screen.text: "${emailScopeConsentText}"
        protocolMappers:
          - name: email
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            config:
              user.attribute: "email"
              id.token.claim: "true"
              access.token.claim: "true"
              userinfo.token.claim: "true"
              introspection.token.claim: "true"
              claim.name: "email"
              jsonType.label: "String"
          - name: email verified
            protocol: openid-connect
            protocolMapper: oidc-usermodel-property-mapper
            config:
              user.attribute: "emailVerified"
              id.token.claim: "true"
              access.token.claim: "true"
              userinfo.token.claim: "true"
              introspection.token.claim: "true"
              claim.name: "email_verified"
              jsonType.label: "boolean"

      - name: roles
        description: "OpenID Connect scope for add user roles to the access token"
        protocol: openid-connect
        attributes:
          include.in.token.scope: "false"
          display.on.consent.screen: "true"
          consent.screen.text: "${rolesScopeConsentText}"
        protocolMappers:
          - name: realm roles
            protocol: openid-connect
            protocolMapper: oidc-usermodel-realm-role-mapper
            config:
              multivalued: "true"
              access.token.claim: "true"
              introspection.token.claim: "true"
              claim.name: "realm_access.roles"
              jsonType.label: "String"
          - name: client roles
            protocol: openid-connect
            protocolMapper: oidc-usermodel-client-role-mapper
            config:
              multivalued: "true"
              access.token.claim: "true"
              introspection.token.claim: "true"
              claim.name: "resource_access.${client_id}.roles"
              jsonType.label: "String"
          - name: audience resolve
            protocol: openid-connect
            protocolMapper: oidc-audience-resolve-mapper
            config:
              access.token.claim: "true"
              introspection.token.claim: "true"

      - name: web-origins
        description: "OpenID Connect scope for add allowed web origins to the access token"
        protocol: openid-connect
        attributes:
          include.in.token.scope: "false"
          display.on.consent.screen: "false"
          consent.screen.text: ""
        protocolMappers:
          - name: allowed web origins
            protocol: openid-connect
            protocolMapper: oidc-allowed-origins-mapper
            config:
              access.token.claim: "true"
              introspection.token.claim: "true"

      - name: acr
        description: "OpenID Connect scope for add acr (authentication context class reference) to the token"
        protocol: openid-connect
        attributes:
          include.in.token.scope: "false"
          display.on.consent.screen: "false"
        protocolMappers:
          - name: acr loa level
            protocol: openid-connect
            protocolMapper: oidc-acr-mapper
            config:
              id.token.claim: "true"
              access.token.claim: "true"
              introspection.token.claim: "true"

      - name: groups
        description: Group memberships claim
        protocol: openid-connect
        attributes:
          include.in.token.scope: "true"
          display.on.consent.screen: "false"

    # -------------------------------------------------------------------------
    # Clients
    # -------------------------------------------------------------------------
    clients:
      # zot-registry: confidential client. Its sole purpose now is to be the
      # `aud` audience that the `zot-ui` and `cluster-puller` clients stamp
      # onto their access_tokens (via the audience mappers below). zot's
      # `bearer.oidc[].audiences=[zot-registry]` validates against this.
      # The client is NOT used directly for any interactive login flow.
      - clientId: zot-registry
        protocol: openid-connect
        publicClient: false
        clientAuthenticatorType: client-secret
        # Keycloak generates the real value on first import and never re-applies
        # this placeholder. Do NOT commit the actual secret.
        secret: PLACEHOLDER_REPLACE_AFTER_REALM_IMPORT
        standardFlowEnabled: false
        directAccessGrantsEnabled: false
        serviceAccountsEnabled: false
        attributes:
          access.token.lifespan: "3600"

      # zot-ui: confidential client driven by Envoy Gateway's SecurityPolicy
      # (zot/securitypolicy.yaml) to run the human Authorization Code flow.
      # Its access_token carries `aud=[zot-ui, zot-registry]` (via the
      # audience mapper) so zot accepts it under the bearer.oidc[Keycloak]
      # entry.
      - clientId: zot-ui
        protocol: openid-connect
        publicClient: false
        clientAuthenticatorType: client-secret
        secret: PLACEHOLDER_REPLACE_AFTER_REALM_IMPORT
        standardFlowEnabled: true
        directAccessGrantsEnabled: false
        serviceAccountsEnabled: false
        redirectUris:
          - https://registry.shion1305.com/oauth2/callback
          - https://registry.i.shion1305.com/oauth2/callback
        webOrigins:
          - https://registry.shion1305.com
          - https://registry.i.shion1305.com
        attributes:
          access.token.lifespan: "3600"
        protocolMappers:
          # Emit `groups` claim so zot's accessControl can authorize.
          - name: groups
            protocolMapper: oidc-group-membership-mapper
            protocol: openid-connect
            consentRequired: false
            config:
              claim.name: "groups"
              full.path: "false"
              id.token.claim: "true"
              access.token.claim: "true"
              userinfo.token.claim: "true"
          # Add `zot-registry` to the access_token's `aud` so zot's
          # bearer.oidc[].audiences=[zot-registry] check passes.
          - name: zot-registry-audience
            protocolMapper: oidc-audience-mapper
            protocol: openid-connect
            config:
              included.client.audience: "zot-registry"
              id.token.claim: "false"
              access.token.claim: "true"

      # cluster-puller: confidential client used by ESO's ClusterGenerator
      # (zot-pull/cluster-generator.yaml) to mint short-lived access_tokens
      # via grant_type=client_credentials. The materialized dockerconfigjson
      # is fanned out to every namespace labelled `zot-pull/enabled=true`,
      # so kubelet can `imagePullSecrets`-pull from the registry.
      #
      # Service-account flow only: no human-facing flow, no interactive
      # login, no redirectUris. The hardcoded `groups` mapper carries both
      # pusher group names so the cluster can pull from `shion1305/**` and
      # `shion1305dev/**` regardless of how `defaultPolicy` evolves on
      # individual repositories.
      - clientId: cluster-puller
        protocol: openid-connect
        publicClient: false
        clientAuthenticatorType: client-secret
        secret: PLACEHOLDER_REPLACE_AFTER_REALM_IMPORT
        standardFlowEnabled: false
        directAccessGrantsEnabled: false
        serviceAccountsEnabled: true
        attributes:
          access.token.lifespan: "3600"
        protocolMappers:
          # Audience mapper required because Keycloak service-account
          # access_tokens default to `aud=account`.
          - name: zot-registry-audience
            protocolMapper: oidc-audience-mapper
            protocol: openid-connect
            config:
              included.client.audience: "zot-registry"
              id.token.claim: "false"
              access.token.claim: "true"
          # Static `groups` claim so zot's accessControl authorizes the
          # service account against the pusher repos. Read on
          # `**` is also permitted by `defaultPolicy: ["read"]`, but the
          # explicit groups make the intent visible.
          - name: groups-static
            protocolMapper: oidc-hardcoded-claim-mapper
            protocol: openid-connect
            config:
              claim.name: "groups"
              claim.value: '["pusher-shion1305", "pusher-shion1305dev"]'
              jsonType.label: "JSON"
              id.token.claim: "false"
              access.token.claim: "true"
              userinfo.token.claim: "false"

    # -------------------------------------------------------------------------
    # Identity Providers
    # -------------------------------------------------------------------------
    # Browser-flow IdP redirector binding (manual step #3 in the header) routes
    # human web logins through the `user` realm (passkey-only) without showing
    # a choice screen.
    identityProviders:
      - alias: user
        displayName: "Sign in with passkey"
        providerId: keycloak-oidc
        enabled: true
        storeToken: false
        addReadTokenRoleOnCreate: false
        trustEmail: true
        firstBrokerLoginFlowAlias: "first broker login"
        config:
          issuer: "https://keycloak.shion1305.com/realms/user"
          authorizationUrl: "https://keycloak.shion1305.com/realms/user/protocol/openid-connect/auth"
          tokenUrl: "https://keycloak.shion1305.com/realms/user/protocol/openid-connect/token"
          userInfoUrl: "https://keycloak.shion1305.com/realms/user/protocol/openid-connect/userinfo"
          logoutUrl: "https://keycloak.shion1305.com/realms/user/protocol/openid-connect/logout"
          jwksUrl: "https://keycloak.shion1305.com/realms/user/protocol/openid-connect/certs"
          useJwksUrl: "true"
          validateSignature: "true"
          clientAuthMethod: "client_secret_post"
          clientId: "zot-broker"
          clientSecret: PLACEHOLDER_REPLACE_AFTER_REALM_IMPORT
          defaultScope: "openid profile email"
          syncMode: IMPORT
