defaultSettings:
  # Use v1 data engine (traditional filesystem-based)
  v2DataEngine: false
  defaultReplicaCount: 1
  # Do not create default disks
  createDefaultDiskLabeledNodes: false
  # Disable default data path since we use specific disk configurations
  defaultDataPath: ""
  # Reservation rate for filesystem-based volumes
  storageReservedPercentageForDefaultDisk: 25
  # Allow Longhorn to run on control-plane nodes
  taintToleration: "node-role.kubernetes.io/control-plane:NoSchedule"
# Disable automatic StorageClass creation by Longhorn
# We manage StorageClasses via GitOps in storageclass.yaml
persistence:
  defaultClass: false
  defaultClassReplicaCount: 1
# Whitelist nodes with longhorn.io/node=true label (excludes raspi-cm4)
longhornManager:
  nodeSelector:
    longhorn.io/node: "true"
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
longhornDriver:
  nodeSelector:
    longhorn.io/node: "true"
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
engineImage:
  nodeSelector:
    longhorn.io/node: "true"
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
longhornUI:
  nodeSelector:
    kubernetes.io/hostname: shion-ubuntu-2505
preUpgradeChecker:
  jobEnabled: false
