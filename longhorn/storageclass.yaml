apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-ssd
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Retain
parameters:
  numberOfReplicas: "1"
  dataEngine: "v1"
  fsType: "ext4"
  diskSelector: "ssd" # This must match with Node CR disk.tags
volumeBindingMode: Immediate
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-hdd
  annotations:
    storageclass.kubernetes.io/description: "Single replica HDD storage on main storage node only"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Retain
parameters:
  numberOfReplicas: "1"
  dataEngine: "v1"
  fsType: "ext4"
  diskSelector: "hdd"
  nodeSelector: "kubernetes.io/hostname:shion-ubuntu-2505"
volumeBindingMode: Immediate
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-hdd-ha
  annotations:
    storageclass.kubernetes.io/description: "High availability HDD storage with 2 replicas for critical workloads"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Retain
parameters:
  numberOfReplicas: "2"
  dataEngine: "v1"
  fsType: "ext4"
  diskSelector: "hdd"
  # Prefer spreading replicas across different nodes
  replicaAutoBalance: "best-effort"
volumeBindingMode: Immediate
