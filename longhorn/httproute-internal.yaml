# Internal Gateway only serves *.i.shion1305.com so the legacy
# longhorn.k.shion1305.com hostname must be retired with this migration.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn-internal
  namespace: longhorn-system
spec:
  parentRefs:
    - name: internal
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - longhorn.i.shion1305.com
  rules:
    - backendRefs:
        - name: longhorn-frontend
          port: 80
