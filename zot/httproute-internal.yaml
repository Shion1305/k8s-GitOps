# Internal registry URL — reachable only via WireGuard (the *.i.shion1305.com
# DNS A record points to 10.130.5.21). Provides a low-latency / no-egress path
# for in-cluster CI/CD or trusted hosts that have WG connectivity, while the
# public registry.shion1305.com URL handles GitHub Actions and external pulls.
#
# Same path-split pattern as the external Gateway, but NO OIDC is attached to
# either route: the WireGuard tunnel is the access boundary, so the UI loads
# without login for read access, and the v2 protocol relies on zot's own
# bearer-OIDC middleware (anonymous reads via defaultPolicy, writes from CI
# go through the public host).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: zot-registry-internal
  namespace: zot
spec:
  parentRefs:
    - name: internal
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - registry.i.shion1305.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v2/
      backendRefs:
        - name: zot
          port: 5000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: zot-ui-internal
  namespace: zot
spec:
  parentRefs:
    - name: internal
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - registry.i.shion1305.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
        - path:
            type: PathPrefix
            value: /v2/_zot/
      backendRefs:
        - name: zot
          port: 5000
