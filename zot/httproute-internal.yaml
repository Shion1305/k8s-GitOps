# Internal registry URL — reachable only via WireGuard (the *.i.shion1305.com
# DNS A record points to 10.130.5.21). Provides a low-latency / no-egress path
# for in-cluster CI/CD or trusted hosts that have WG connectivity, while the
# public registry.shion1305.com URL handles GitHub Actions and external pulls.
#
# Same three-route split as the external Gateway (see httproute-external.yaml
# for the rationale): zot-catalog-probe-internal carries the SPA boot probes and
# is targeted by the OIDC SecurityPolicy, zot-registry-internal carries
# unauthenticated v2 traffic that the Lua filter bridges, and zot-ui-internal
# carries the SPA + extension XHRs and is fully behind the SecurityPolicy.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: zot-catalog-probe-internal
  namespace: zot
spec:
  parentRefs:
    - name: internal
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - registry.i.shion1305.com
  rules:
    - matches:
        - path:
            type: Exact
            value: /v2/
        - path:
            type: Exact
            value: /v2/_catalog
      backendRefs:
        - name: zot
          port: 5000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: zot-registry-internal
  namespace: zot
spec:
  parentRefs:
    - name: internal
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - registry.i.shion1305.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v2/
      backendRefs:
        - name: zot
          port: 5000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: zot-ui-internal
  namespace: zot
spec:
  parentRefs:
    - name: internal
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - registry.i.shion1305.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
        - path:
            type: PathPrefix
            value: /v2/_zot/
      backendRefs:
        - name: zot
          port: 5000
