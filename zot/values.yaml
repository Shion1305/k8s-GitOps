replicaCount: 1
image:
  repository: ghcr.io/project-zot/zot-linux-amd64
  pullPolicy: IfNotPresent
  tag: "v2.1.16"

service:
  type: ClusterIP
  port: 5000

ingress:
  enabled: false

httpGet:
  scheme: HTTP
  port: 5000

startupProbe:
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 6

mountConfig: true
configFiles:
  config.json: |-
    {
      "distSpecVersion": "1.1.0",
      "storage": {
        "rootDirectory": "/var/lib/registry",
        "gc": true,
        "gcDelay": "1h",
        "gcInterval": "24h"
      },
      "http": {
        "address": "0.0.0.0",
        "port": "5000",
        "realm": "zot",
        "auth": {
          "openid": {
            "providers": {
              "keycloak": {
                "name": "keycloak",
                "issuer": "https://keycloak.shion1305.com/realms/zot",
                "credentialsFile": "/etc/zot/secrets/keycloak-credentials.json",
                "scopes": ["openid", "email", "groups"]
              }
            }
          },
          "sessionKeysFile": "/etc/zot/secrets/session-keys.json"
        },
        "accessControl": {
          "repositories": {
            "**": {
              "anonymousPolicy": ["read"],
              "policies": [
                {
                  "groups": ["zot-admin"],
                  "actions": ["read", "create", "update", "delete"]
                }
              ]
            },
            "shion1305/**": {
              "policies": [
                {
                  "groups": ["pusher-shion1305"],
                  "actions": ["read", "create", "update"]
                }
              ]
            },
            "shion1305dev/**": {
              "policies": [
                {
                  "groups": ["pusher-shion1305dev"],
                  "actions": ["read", "create", "update"]
                }
              ]
            }
          },
          "adminPolicy": {
            "groups": ["zot-admin"],
            "actions": ["read", "create", "update", "delete"]
          }
        }
      },
      "log": { "level": "info" },
      "extensions": {
        "metrics": {
          "enable": true,
          "prometheus": { "path": "/metrics" }
        },
        "scrub": { "enable": true, "interval": "24h" },
        "search": { "enable": true, "cve": { "updateInterval": "2h" } },
        "ui": { "enable": true },
        "trust": { "enable": true, "cosign": true, "notation": true }
      }
    }

externalSecrets: []
mountSecret: false

persistence: true
pvc:
  create: true
  accessModes: ["ReadWriteOnce"]
  storage: 500Gi
  storageClassName: longhorn

extraVolumes:
  - name: zot-oidc
    secret:
      secretName: zot-oidc

extraVolumeMounts:
  - name: zot-oidc
    mountPath: /etc/zot/secrets
    readOnly: true

strategy:
  type: RollingUpdate

# Upstream zot publishes architecture-specific images
# (`zot-linux-amd64` vs `zot-linux-arm64`) rather than a multi-arch manifest
# list, and `image.repository` above is hard-pinned to amd64. Constrain
# scheduling so the StatefulSet doesn't land on an arm64 node and crash with
# `exec format error`. Switch to a multi-arch image and remove this if/when
# the upstream chart starts publishing a manifest list.
nodeSelector:
  kubernetes.io/arch: amd64

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: "30s"
    path: "/metrics"
