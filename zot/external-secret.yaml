apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zot-oidc
  namespace: zot
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault
    kind: SecretStore
  target:
    name: zot-oidc
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          managed-by: external-secrets
  data:
    - secretKey: clientsecret
      remoteRef:
        key: keycloak-client
        property: clientsecret
    - secretKey: session-keys
      remoteRef:
        key: session-keys
        property: key
