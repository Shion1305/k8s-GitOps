apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zot-oidc
  namespace: zot
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault
    kind: SecretStore
  target:
    name: zot-oidc
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          managed-by: external-secrets
      data:
        # zot uses Viper to parse these files and infers format from the
        # extension — keys must end in .json/.yaml/etc., not bare names.
        keycloak-credentials.json: |
          {"clientid": "zot-registry", "clientsecret": "{{ .clientsecret }}"}
        session-keys.json: |
          {"hashKey": "{{ .sessionHashKey }}"}
  data:
    - secretKey: clientsecret
      remoteRef:
        key: keycloak-client
        property: clientsecret
    - secretKey: sessionHashKey
      remoteRef:
        key: session-keys
        property: key
