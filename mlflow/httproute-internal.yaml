# Internal Gateway only serves *.i.shion1305.com so the legacy
# mlflow.k.shion1305.com hostname must be retired with this migration.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mlflow-internal
  namespace: mlflow
spec:
  parentRefs:
    - name: internal
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - mlflow.i.shion1305.com
  rules:
    - backendRefs:
        - name: mlflow
          port: 80
