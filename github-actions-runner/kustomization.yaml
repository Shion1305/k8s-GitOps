apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - external-secret.yaml
  - configmap.yaml
  - rbac.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - httproute-external.yaml
  - httproute-internal.yaml
  - reference-grant.yaml
  - networkpolicy.yaml
  - init-job.yaml
  - servicemonitor.yaml
  # Grafana objects (namespace: grafana) shipped by this app, like gh-leaked-tokens.
  - grafana-folder.yaml
  - grafana-dashboard.yaml
