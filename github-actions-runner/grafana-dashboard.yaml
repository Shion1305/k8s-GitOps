# GARM / GitHub Actions runners dashboard. Delivered as inline JSON (same
# pattern as grafana/tt-exporter/dashboard.yaml) so we own the panels. Every
# panel and template variable hard-pins datasource {type: prometheus, uid:
# prometheus} so this dashboard is never affected by the datasource-picker
# ambiguity that the gh-leaked-tokens datasource introduces into main-grafana.
# The CR lives in the `grafana` namespace but is shipped by THIS app.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: garm-runners
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: main-grafana
  folderRef: github-actions-runners
  resyncPeriod: 5m
  json: |
    {
      "title": "GitHub Actions Runners (GARM)",
      "uid": "garm-runners",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "graphTooltip": 1,
      "tags": [
        "garm",
        "github-actions",
        "runners",
        "ci"
      ],
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "refresh": "30s",
      "timepicker": {
        "refresh_intervals": [
          "10s",
          "30s",
          "1m",
          "5m",
          "15m"
        ],
        "time_options": [
          "1h",
          "6h",
          "12h",
          "24h",
          "2d",
          "7d"
        ]
      },
      "templating": {
        "list": [
          {
            "name": "pool_owner",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "query": "label_values(garm_pool_info, pool_owner)",
            "refresh": 2,
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "label": "Repository / Owner",
            "sort": 1,
            "current": {
              "selected": true,
              "text": [
                "All"
              ],
              "value": [
                "$__all"
              ]
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Overview",
          "collapsed": false,
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "panels": []
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Controller Health",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 1
          },
          "targets": [
            {
              "refId": "A",
              "expr": "max(garm_health)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "instant": false,
              "range": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": {
                      "text": "DOWN",
                      "color": "red",
                      "index": 1
                    },
                    "1": {
                      "text": "UP",
                      "color": "green",
                      "index": 0
                    }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
