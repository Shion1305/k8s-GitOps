# Legacy nginx-ssl Ingress kept alongside the new HTTPRoute
# (httproute-external.yaml) so traffic continues to flow while DNS for
# langfuse.k.shion1305.com still resolves to the nginx-ssl node IP. Once
# DNS is repointed to the envoy-gateway external IP and verified, this
# Ingress can be removed in a follow-up PR.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: langfuse
  namespace: langfuse
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx-ssl
  tls:
    - hosts:
        - langfuse.k.shion1305.com
      secretName: langfuse-tls
  rules:
    - host: langfuse.k.shion1305.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: langfuse-web
                port:
                  number: 3000
