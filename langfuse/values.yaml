# Langfuse Helm Chart Values
# Documentation: https://langfuse.com/self-hosting/deployment/kubernetes-helm

langfuse:
  service:
    type: ClusterIP
    port: 3000

  # Security configurations - secrets managed directly in Kubernetes
  nextauth:
    url: "https://langfuse.shion1305.com"
    secret:
      secretKeyRef:
        name: "langfuse-credentials"
        key: "NEXTAUTH_SECRET"

  salt:
    secretKeyRef:
      name: "langfuse-credentials"
      key: "SALT"

  encryptionKey:
    secretKeyRef:
      name: "langfuse-credentials"
      key: "ENCRYPTION_KEY"

  # Web deployment configuration
  web:
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 2Gi
    pod:
      additionalEnv:
        - name: "AUTH_DISABLE_USERNAME_PASSWORD"
          value: "true"
        - name: "AUTH_GITHUB_CLIENT_ID"
          valueFrom:
            secretKeyRef:
              name: "langfuse-github-oauth-secret"
              key: "clientID"
        - name: "AUTH_GITHUB_CLIENT_SECRET"
          valueFrom:
            secretKeyRef:
              name: "langfuse-github-oauth-secret"
              key: "clientSecret"
        - name: "AUTH_GITHUB_ALLOW_ACCOUNT_LINKING"
          value: "true"
    features:
      signUpDisabled: true
      telemetryEnabled: false

  # Worker deployment configuration
  worker:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi

# PostgreSQL - use shared postgres instance managed by postgres-operator
postgresql:
  deploy: false
  host: "postgres-shared.postgres-operator-deployment.svc.cluster.local"
  port: 5432
  auth:
    username: "langfuse"
    database: "langfuse"
    existingSecret: "langfuse-db-credentials"
    secretKeys:
      userPasswordKey: "DB_PASSWORD"

# ClickHouse - embedded deployment
clickhouse:
  enabled: true
  # Single replica for PoC: shards=1, so every replica is a full copy of the
  # same data. HA replication isn't worth 3x the memory/disk at this scale.
  replicaCount: 1
  auth:
    existingSecret: "langfuse-credentials"
    existingSecretKey: "CLICKHOUSE_PASSWORD"
  persistence:
    enabled: true
    size: 20Gi
    storageClass: "longhorn-ssd"
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - shion-ubuntu-2505
  zookeeper:
    # Single node: just enough coordination for ClickHouse's ReplicatedMergeTree
    # tables, which langfuse's migrations require even on one ClickHouse replica.
    replicaCount: 1
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - shion-ubuntu-2505

# Redis: bitnami valkey subchart (aliased `redis`) -> uses `primary.*`,
# not the redis chart's `master.*` (the latter is silently ignored here).
redis:
  deploy: true
  auth:
    enabled: true
    existingSecret: "langfuse-credentials"
    existingSecretPasswordKey: "REDIS_PASSWORD"
  # RDB snapshots (written to a temp file then atomically renamed) instead of
  # AOF (in-place append): an unclean node shutdown can't leave a half-written
  # file that blocks startup. redis is a disposable BullMQ queue/cache here;
  # postgres + clickhouse hold the source of truth.
  commonConfiguration: |-
    appendonly no
    save "900 1 300 10 60 10000"
  primary:
    extraFlags:
      - "--maxmemory-policy noeviction"   # required by the langfuse chart
    persistence:
      enabled: true
      # size/storageClass left at chart default (8Gi, default longhorn-ssd):
      # the existing PVC is 8Gi and StatefulSet volumeClaimTemplates are immutable.
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - shion-ubuntu-2505

# S3-compatible storage (MinIO)
s3:
  enabled: true
  auth:
    existingSecret: "langfuse-credentials"
    rootPasswordSecretKey: "S3_ROOT_PASSWORD"
  persistence:
    enabled: true
    size: 50Gi
    storageClass: "longhorn-ssd"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - shion-ubuntu-2505

# Ingress disabled - managed separately via Gateway API HTTPRoute (httproute-external.yaml)
ingress:
  enabled: false
