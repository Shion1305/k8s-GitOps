# 301 redirect for the legacy hostname (langfuse.k.shion1305.com) so existing
# bookmarks and SDK base URLs keep working. Matches the keycloak/vault precedent.
#
# NextAuth callbacks (https://langfuse.shion1305.com/api/auth/callback/...)
# must be added to the upstream OAuth provider's allowed-callback list before
# this PR merges. The langfuse `nextauth.url` value (langfuse/values.yaml) has
# already been flipped to the apex hostname.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: langfuse-legacy-redirect
  namespace: langfuse
spec:
  parentRefs:
    - name: external
      namespace: envoy-gateway-system
      sectionName: https-legacy-k
  hostnames:
    - langfuse.k.shion1305.com
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: langfuse.shion1305.com
            statusCode: 301
