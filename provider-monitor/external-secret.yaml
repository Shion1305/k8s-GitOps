# Materializes the domains list from Vault into a Kubernetes Secret that
# the exporter mounts at /data/domains.txt.
#
# Vault data layout (KV v2 mount `provider-monitor/`):
#   vault kv put provider-monitor/domains \
#     domains.txt=@/path/to/local/domains.txt
#
# Update the value in Vault and ESO re-syncs within `refreshInterval`.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: provider-monitor-domains
  namespace: provider-monitor
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault
    kind: SecretStore
  target:
    name: provider-monitor-domains
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          managed-by: external-secrets
  data:
    - secretKey: domains.txt
      remoteRef:
        key: domains
        property: domains.txt
