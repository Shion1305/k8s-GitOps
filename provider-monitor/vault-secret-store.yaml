# SA that the per-namespace SecretStore authenticates to Vault with.
# The Vault role `eso-provider-monitor` is bound to this SA + namespace
# (see vault/scripts/setup-eso-policies.sh) and grants read on the
# `provider-monitor/` KV v2 mount.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso
  namespace: provider-monitor
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault
  namespace: provider-monitor
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "provider-monitor"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-provider-monitor"
          serviceAccountRef:
            name: "eso"
