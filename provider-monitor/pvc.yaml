# Baselines and round snapshots written by the exporter under
# /app/out/provider_monitor. Without persistence the first round after a Pod
# restart re-baselines every domain and the `*_changed` diff metrics report
# spurious zeros until enough history accumulates.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: provider-monitor-data
  namespace: provider-monitor
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
