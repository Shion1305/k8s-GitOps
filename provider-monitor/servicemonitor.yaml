apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: provider-monitor
  namespace: provider-monitor
  labels:
    app: provider-monitor
    # Required so kube-prometheus-stack's Prometheus picks this up; the
    # release label is the chart's default ServiceMonitorSelector.
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: provider-monitor
  namespaceSelector:
    matchNames:
      - provider-monitor
  endpoints:
    - port: metrics
      # Match the probe interval — finer scraping just resamples the same
      # snapshot.
      interval: 60s
      scrapeTimeout: 30s
      path: /metrics
      scheme: http
