global:
  enabled: true
  tlsDisable: true
injector:
  enabled: false
server:
  image:
    repository: hashicorp/vault
    tag: 2.0.3
  # vault 2.0.1 ships the binary with the cap_ipc_lock file capability, so it
  # refuses to start unless the container is granted IPC_LOCK (mlock keeps
  # secrets out of swap). disable_mlock does not help: the entrypoint fails at
  # `vault -version`, before any HCL config is read.
  statefulSet:
    securityContext:
      container:
        capabilities:
          add:
            - IPC_LOCK
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m
  readinessProbe:
    enabled: true
    path: "/v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204"
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    enabled: true
    path: "/v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204"
    initialDelaySeconds: 60
    periodSeconds: 10
    failureThreshold: 5
  # Ingress disabled; HTTPRoutes in vault/httproute-*.yaml attach the per-host
  # routing to Envoy Gateway (matches harbor/zot/keycloak pattern).
  ingress:
    enabled: false
  # 3-node raft cluster: a quorum (2 of 3) must survive any single-node event, so
  # the three pods must land on three distinct nodes.
  affinity:
    # Prefer the strong amd64 nodes, then the OCI arm64 nodes; all schedulable
    # nodes stay eligible as a last resort so a pod is never left Pending. The
    # longhorn-hdd-ha class has dataLocality=disabled, so a pod can attach its
    # volume from any node.
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - shion-ubuntu-2505
                  - shion-ubuntu-2605
        - weight: 50
          preference:
            matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - instance-2024-1
                  - instance-k8s-proxy
    # Hard anti-affinity: never co-locate two vault pods on the same node.
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: vault
              app.kubernetes.io/instance: vault
              component: server
          topologyKey: kubernetes.io/hostname
  # Tolerate the control-plane taint so instance-2024-1 can host a replica.
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  serviceAccount:
    create: true
    name: "vault-unsealer"
  # Extra volume holding the unseal keys, mounted read-only into the sidecar.
  # The vault-unseal-keys Secret is created out-of-band and never committed
  # (public repo).
  volumes:
    - name: unseal-keys
      secret:
        secretName: vault-unseal-keys
        # 0440: files are owned root:1000 (pod fsGroup=1000); the sidecar runs as
        # uid 100 / gid 1000 and reads the keys via the group bit.
        defaultMode: 0440
  extraContainers:
    # Auto-unseal sidecar. Reads the unseal keys from the mounted Secret and
    # unseals the local node. Sourcing keys from a Secret rather than from the
    # active node means a pod can self-unseal even when no node is active, so a
    # full simultaneous restart (e.g. a node reboot) recovers without a human
    # supplying keys.
    - name: unseal-sidecar
      image: hashicorp/vault:2.0.3
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 1000
      command:
        - sh
        - -c
        - |
          echo "Starting file-based auto-unseal sidecar..."
          LOCAL_ADDR="http://127.0.0.1:8200"
          KEYS_DIR="/vault/unseal-keys"

          while true; do
            sleep 10

            SEALED=$(VAULT_ADDR="$LOCAL_ADDR" vault status 2>/dev/null | awk '/^Sealed/ {print $2; exit}')
            if [ -z "$SEALED" ]; then
              continue
            fi

            if [ "$SEALED" = "true" ]; then
              echo "Vault is sealed! Unsealing from mounted keys..."
              for f in "$KEYS_DIR"/key1 "$KEYS_DIR"/key2 "$KEYS_DIR"/key3; do
                if [ -f "$f" ]; then
                  VAULT_ADDR="$LOCAL_ADDR" vault operator unseal "$(cat "$f")" >/dev/null 2>&1 || true
                fi
              done
              echo "Unseal keys submitted."
              sleep 5
            fi
          done
      volumeMounts:
        - name: unseal-keys
          mountPath: /vault/unseal-keys
          readOnly: true
  standalone:
    enabled: false
  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true
        # Internal hostname is the source of truth for any URL Vault echoes to
        # clients (e.g. UI redirects). External hostname is path-restricted and
        # auth-only — not suitable as api_addr.
        api_addr = "https://vault.i.shion1305.com"

        listener "tcp" {
          tls_disable = true
          address = "[::]:8200"
          cluster_address = "[::]:8201"
        }

        storage "raft" {
          path = "/vault/data"

          retry_join {
            leader_api_addr = "http://vault-0.vault-internal:8200"
          }

          retry_join {
            leader_api_addr = "http://vault-1.vault-internal:8200"
          }

          retry_join {
            leader_api_addr = "http://vault-2.vault-internal:8200"
          }
        }

        service_registration "kubernetes" {}
  dataStorage:
    enabled: true
    size: 6Gi
    storageClass: longhorn-hdd-ha
    accessMode: ReadWriteOnce
  auditStorage:
    enabled: true
    size: 6Gi
    storageClass: longhorn-hdd-ha
    accessMode: ReadWriteOnce
ui:
  enabled: true
  serviceType: ClusterIP
  servicePort: 8200
  targetPort: 8200
