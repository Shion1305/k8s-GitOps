---
# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/aqua-yaml.json
#
# Inline aqua config for the reusable harbor-build-push workflow.
#
# Why a separate file (instead of reusing the repo-root aqua.yaml):
# This workflow is consumed via `uses:
# Shion1305/k8s-GitOps/.github/workflows/harbor-build-push.yaml@<ref>` from
# other repos. Inside the reusable run, `actions/checkout` checks out the
# CALLER repo, not k8s-GitOps — so the root aqua.yaml is not on disk and
# `aqua install` (or lazy shims) cannot resolve `crane`. The fix is for the
# reusable workflow to checkout *this* repo into a side directory and point
# AQUA_GLOBAL_CONFIG at this file, which lists only the tools the reusable
# itself needs. Keeping the package list minimal (just crane) avoids forcing
# callers to download unrelated tooling like vault or kustomize.
#
# Versions are kept in sync with aqua.yaml at the repo root for any package
# this file shares with it. The `*.aqua.yaml` suffix matches one of Renovate's
# built-in aqua manager patterns, so the package list below gets version
# updates without any extra renovate.json wiring.
registries:
  - type: standard
    ref: v4.479.0 # renovate: depName=aquaproj/aqua-registry
packages:
  # Provides `crane` — used by the reusable workflow to push OCI artifacts.
  - name: google/go-containerregistry@v0.21.5
