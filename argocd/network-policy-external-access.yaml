apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-argocd-external-access
  namespace: argocd
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: argocd-repo-server
  policyTypes:
    - Egress
  egress:
    # Allow external HTTPS (Git repos)
    - ports:
        - protocol: TCP
          port: 443
    # Allow external SSH (Git repos)
    - ports:
        - protocol: TCP
          port: 22
