# Legacy nginx-ssl Ingress kept alongside the new HTTPRoute (httproute.yaml)
# so traffic continues to flow while DNS for argocd.k.shion1305.com still
# resolves to the nginx-ssl node IP. Once DNS is repointed to the
# envoy-gateway external IP (141.147.189.36) and verified, this Ingress
# (and the nginx-ssl controller it depends on) can be removed in a
# follow-up PR.
#
# backend-protocol annotation removed and port lowered to 80 because
# values.yaml now sets `configs.params.server.insecure=true`, so
# argocd-server speaks plain HTTP on :80.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-ingress
  namespace: argocd
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx-ssl
  tls:
    - hosts:
        - argocd.k.shion1305.com
  rules:
    - host: argocd.k.shion1305.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
