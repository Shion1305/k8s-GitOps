# 301 redirect for the legacy hostname (argocd.k.shion1305.com) so existing
# bookmarks keep working. Matches the keycloak/vault precedent.
#
# CLI clients (argocd CLI, GitHub Actions) and the Dex GitHub OAuth callback
# (https://argocd.shion1305.com/api/dex/callback) must be migrated to the
# apex hostname directly — the GitHub OAuth app's allowed callback list must
# include the apex URL before this PR merges.
#
# Gateway API spec restricts requestRedirect.statusCode to 301 or 302; we use
# 301 (permanent).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-legacy-redirect
  namespace: argocd
spec:
  parentRefs:
    - name: external
      namespace: envoy-gateway-system
      sectionName: https-legacy-k
  hostnames:
    - argocd.k.shion1305.com
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: argocd.shion1305.com
            statusCode: 301
