# Kubernetes control-plane / workload dashboards.
# Source: ConfigMaps rendered by `grafana.forceDeployDashboards: true` in
# grafana/values.yaml. Naming follows the chart release pattern
# `kube-prometheus-stack-<dashboard>` with a single `<dashboard>.json` key.
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: k8s-resources-cluster
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: main-grafana
  folderRef: kubernetes
  configMapRef:
    name: kube-prometheus-stack-k8s-resources-cluster
    key: k8s-resources-cluster.json
---
