# Per-node OS-level dashboards (CPU, memory, disk, network).
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: node-cluster-rsrc-use
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: main-grafana
  folderRef: node-metrics
  configMapRef:
    name: kube-prometheus-stack-node-cluster-rsrc-use
    key: node-cluster-rsrc-use.json
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: node-rsrc-use
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: main-grafana
  folderRef: node-metrics
  configMapRef:
    name: kube-prometheus-stack-node-rsrc-use
    key: node-rsrc-use.json
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: nodes
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: main-grafana
  folderRef: node-metrics
  configMapRef:
    name: kube-prometheus-stack-nodes
    key: nodes.json
