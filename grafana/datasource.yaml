apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: main-grafana
  datasource:
    # Stable UID so dashboards can reference this datasource by a fixed
    # string. Without this, grafana-operator assigns a random UUID on first
    # apply and any GrafanaDashboard JSON that hard-codes `uid: prometheus`
    # silently shows "No data".
    uid: prometheus
    name: Prometheus
    type: prometheus
    access: proxy
    url: http://kube-prometheus-stack-prometheus.grafana.svc.cluster.local:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 30s
      queryTimeout: 60s
