  - name: kube-prometheus-stack-nodes
    namespace: grafana
    files:
      - dashboards/json/nodes.json
  - name: kube-prometheus-stack-persistentvolumesusage
    namespace: grafana
    files:
      - dashboards/json/persistentvolumesusage.json
  - name: kube-prometheus-stack-pod-total
    namespace: grafana
