# Kube-Prometheus Stack Helm Values
# Includes Grafana, Prometheus, and AlertManager
# Global settings
global:
  scrapeInterval: 30s
  evaluationInterval: 30s
# Prometheus configuration
prometheus:
  enabled: true
  prometheusSpec:
    # Retention settings
    retention: 999d # High value to allow size to be the primary retention factor
    retentionSize: 340GB # About ~85% of total capacity for safety margin
    # Storage configuration
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn-hdd
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 400Gi
    # Service discovery settings - discover all ServiceMonitors
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    serviceMonitorSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorNamespaceSelector: {}
    podMonitorSelector: {}
    ruleSelectorNilUsesHelmValues: false
    ruleNamespaceSelector: {}
    ruleSelector: {}
    # Resource configuration
    resources:
      limits:
        cpu: 2000m
        memory: 8Gi
      requests:
        cpu: 1000m
        memory: 4Gi
# Grafana is managed by grafana-operator; disable the bundled chart instance
# but still render the chart's bundled dashboard ConfigMaps so the operator
# can adopt them via GrafanaDashboard CRs (see grafana/dashboards.yaml).
grafana:
  enabled: false
  forceDeployDashboards: true
# AlertManager configuration
alertmanager:
  enabled: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn-hdd
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    resources:
      limits:
        cpu: 100m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 128Mi
    nodeSelector:
      kubernetes.io/hostname: shion-ubuntu-2505
# Node Exporter — managed as the chart's bundled subchart so dashboards
# (nodes, node-rsrc-use, node-cluster-rsrc-use) auto-render and stay in sync
# with the DaemonSet labels/ServiceMonitor.
nodeExporter:
  enabled: true
  operatingSystems:
    aix:
      enabled: false
    darwin:
      enabled: false
# Kube State Metrics
kubeStateMetrics:
  enabled: true
# Subchart configuration for prometheus-node-exporter
prometheus-node-exporter:
  podLabels:
    app: node-exporter
    component: metrics
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    fsGroup: 65534
  tolerations:
    - operator: Exists
  resources:
    limits:
      cpu: 200m
      memory: 50Mi
    requests:
      cpu: 100m
      memory: 30Mi
  # hostNetwork disabled so pod gets a CNI IP reachable by Prometheus
  # (hostNetwork: true caused the pod to use the firewalled host IP).
  hostNetwork: false
  hostPID: true
  hostRootFSMount:
    enabled: true
    mountPropagation: HostToContainer
  prometheus:
    monitor:
      enabled: true
      jobLabel: node-exporter
      interval: 30s
      scrapeTimeout: 10s
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          action: replace
          targetLabel: instance
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          action: replace
          targetLabel: node
