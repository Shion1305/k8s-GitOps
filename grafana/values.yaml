# Kube-Prometheus Stack Helm Values
# Includes Grafana, Prometheus, and AlertManager
# Global settings
global:
  scrapeInterval: 30s
  evaluationInterval: 30s
# Prometheus configuration
prometheus:
  enabled: true
  prometheusSpec:
    # Retention settings
    retention: 999d # High value to allow size to be the primary retention factor
    retentionSize: 340GB # About ~85% of total capacity for safety margin
    # Storage configuration
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn-hdd
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 400Gi
    # Service discovery settings - discover all ServiceMonitors
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    serviceMonitorSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorNamespaceSelector: {}
    podMonitorSelector: {}
    ruleSelectorNilUsesHelmValues: false
    ruleNamespaceSelector: {}
    ruleSelector: {}
    # Resource configuration
    resources:
      limits:
        cpu: 2000m
        memory: 8Gi
      requests:
        cpu: 1000m
        memory: 4Gi
# Grafana is managed by grafana-operator; disable the bundled chart instance
# but still render the chart's bundled dashboard ConfigMaps so the operator
# can adopt them via GrafanaDashboard CRs (see grafana/dashboards.yaml).
grafana:
  enabled: false
  forceDeployDashboards: true
# AlertManager configuration
alertmanager:
  enabled: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn-hdd
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    resources:
      limits:
        cpu: 100m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 128Mi
    nodeSelector:
      kubernetes.io/hostname: shion-ubuntu-2505
# Node Exporter (disabled since we're deploying it separately)
nodeExporter:
  enabled: false
# Kube State Metrics
kubeStateMetrics:
  enabled: true
# Prometheus Node Exporter Service Monitor
prometheusNodeExporter:
  enabled: false # We'll use our separate deployment
# Service Monitors
prometheus-node-exporter:
  enabled: true
