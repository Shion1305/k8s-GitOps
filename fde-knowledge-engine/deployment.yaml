apiVersion: apps/v1
kind: Deployment
metadata:
  name: fde-knowledge-engine-web
  namespace: fde-knowledge-engine
  labels:
    app: fde-knowledge-engine-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fde-knowledge-engine-web
  template:
    metadata:
      labels:
        app: fde-knowledge-engine-web
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      # The web app creates research/codex-login Jobs via the K8s API; this SA
      # grants exactly that (see rbac.yaml).
      serviceAccountName: web-job-creator
      containers:
        - name: web
          # Harbor robot-account pull creds are auto-injected by the Kyverno
          # `harbor-pull-injection` ClusterPolicy on admission — no manual
          # imagePullSecrets needed.
          image: harbor.shion1305.com/shion1305/fde-knowledge-engine-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fde-knowledge-engine-db-credentials
                  key: DATABASE_URL
            # --- research/codex-login Job orchestration (web/lib/k8s) ---
            # The namespace the web app creates Jobs in. Downward API so it
            # always matches where the Pod actually runs.
            - name: FDE_JOB_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # The runner image the Jobs run (Go binary + codex CLI).
            - name: FDE_RUNNER_IMAGE
              value: harbor.shion1305.com/shion1305/fde-knowledge-engine-runner:latest
            # The PVC mounted at CODEX_HOME in every research/codex-login Job.
            - name: FDE_CODEX_HOME_PVC
              value: codex-home
            # The Secret the Jobs read DATABASE_URL from (wired by reference into
            # the Job spec — the web app never reads the secret value itself).
            - name: FDE_DB_SECRET_NAME
              value: fde-knowledge-engine-db-credentials
            - name: FDE_DB_SECRET_KEY
              value: DATABASE_URL
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: fde-knowledge-engine-web
  namespace: fde-knowledge-engine
  labels:
    app: fde-knowledge-engine-web
spec:
  selector:
    app: fde-knowledge-engine-web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
