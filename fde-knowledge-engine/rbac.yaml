# RBAC for the web app to drive research/codex-login as K8s Jobs.
#
# The web Deployment (a thin Next.js reader) launches one throwaway Job per
# research request and per device-code login, then watches the Job/Pod and tails
# its logs. This grants exactly that, scoped to the fde-knowledge-engine
# namespace (a Role, not ClusterRole). It does NOT grant Secret access — the
# Job's DATABASE_URL is wired by reference in the Job spec, not read by the web
# app — nor any write to workloads other than the Jobs/Leases it owns.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: web-job-creator
  namespace: fde-knowledge-engine
  labels:
    app.kubernetes.io/part-of: fde-knowledge-engine
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: web-job-creator
  namespace: fde-knowledge-engine
  labels:
    app.kubernetes.io/part-of: fde-knowledge-engine
rules:
  # Create/inspect/delete the research & codex-login Jobs.
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Find the Pod a Job spawned, to read its status and logs.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Tail the Pod's logs (research progress; device-code URL + one-time code).
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # The fixed-name Lease `codex-home-lock` is the atomic mutex that serializes
  # CODEX_HOME Jobs (the PVC is ReadWriteOnce). create-on-fixed-name is the lock;
  # the others reclaim a stale lock and tie it to the owning Job.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create", "get", "list", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: web-job-creator
  namespace: fde-knowledge-engine
  labels:
    app.kubernetes.io/part-of: fde-knowledge-engine
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: web-job-creator
subjects:
  - kind: ServiceAccount
    name: web-job-creator
    namespace: fde-knowledge-engine
