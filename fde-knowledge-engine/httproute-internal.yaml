# Publishes fde-knowledge-engine-web on the internal Gateway (WireGuard-only).
# TLS terminates at the Gateway; plain HTTP to the Service.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fde-knowledge-engine-internal
  namespace: fde-knowledge-engine
spec:
  parentRefs:
    - name: internal
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - fde.i.shion1305.com
  rules:
    - backendRefs:
        - name: fde-knowledge-engine-web
          port: 3000
