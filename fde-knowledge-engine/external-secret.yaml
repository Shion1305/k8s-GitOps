# Materializes the full DATABASE_URL connection string from Vault
# (fde-knowledge-engine/db, key `url`) into a Secret the web Deployment consumes.
# The value is the complete postgres URL (pointing at postgres-shared) and is
# written to Vault out-of-band; never committed (public repo):
#   vault kv put fde-knowledge-engine/db \
#     url=postgresql://<user>:<pass>@postgres-shared.postgres-operator-deployment.svc.cluster.local:5432/<db>
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: fde-knowledge-engine-db-credentials
  namespace: fde-knowledge-engine
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault
    kind: SecretStore
  target:
    name: fde-knowledge-engine-db-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          managed-by: external-secrets
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: db
        property: url
