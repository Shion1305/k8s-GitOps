# Persistent CODEX_HOME for the research/codex-login Jobs.
#
# codex stores auth.json (and refreshes its access token in place) under
# CODEX_HOME. The web app authenticates codex via a one-off device-code Job
# (`fde-knowledge-engine codex-login`); the resulting auth.json must outlive that
# Job and be visible to every later research Job. This PVC is the single source
# of truth for codex credentials — there is intentionally NO Vault/ESO secret
# for codex auth (DB creds still come from Vault; codex auth does not).
#
# accessMode is ReadWriteOnce: the cluster has no RWX storage (Longhorn here is
# ext4 block = RWO only). With numberOfReplicas=1 the volume lives on one node
# (ssd-tagged), so every Pod that mounts it co-locates there. The web app
# SERIALIZES Job creation via an atomic Lease lock (`codex-home-lock`), so at
# most one CODEX_HOME-mounting Job runs at a time — two Pods never attach this
# RWO volume at once (which would raise a Multi-Attach error).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: codex-home
  namespace: fde-knowledge-engine
  labels:
    app.kubernetes.io/part-of: fde-knowledge-engine
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-ssd
  resources:
    requests:
      storage: 2Gi
