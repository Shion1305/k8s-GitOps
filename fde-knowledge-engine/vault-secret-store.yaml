apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso
  namespace: fde-knowledge-engine
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault
  namespace: fde-knowledge-engine
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      # Dedicated KV v2 mount: vault secrets enable -path=fde-knowledge-engine kv-v2
      path: "fde-knowledge-engine"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-fde-knowledge-engine"
          serviceAccountRef:
            name: "eso"
