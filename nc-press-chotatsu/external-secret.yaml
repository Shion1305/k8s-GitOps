apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nc-press-chotatsu-config
  namespace: nc-press-chotatsu
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault
    kind: SecretStore
  target:
    name: nc-press-chotatsu-config
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          managed-by: external-secrets
  dataFrom:
    - extract:
        key: config
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nc-press-chotatsu-gdrive-sa
  namespace: nc-press-chotatsu
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault
    kind: SecretStore
  target:
    name: nc-press-chotatsu-gdrive-sa
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          managed-by: external-secrets
  data:
    - secretKey: sa.json
      remoteRef:
        key: gdrive-sa
        property: sa.json
