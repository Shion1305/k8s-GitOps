# Data plane for the `envoy-default` GatewayClass.
#
# Runs as a DaemonSet (NOT a Deployment) on the OCI node instance-k8s-proxy AND
# the amd64 home nodes shion-ubuntu-2505 / shion-ubuntu-2605, binding 80/443/5432
# via hostNetwork so each node's own IP terminates the merged listeners:
#   - instance-k8s-proxy: 141.147.189.36 (public) + 10.130.5.21 (internal VIP)
#   - shion-ubuntu-2505:  10.130.5.66  \  *.i.shion1305.com DNS round-robins across
#   - shion-ubuntu-2605:  10.130.5.67  /  these two home nodes, so it terminates
#     on a home node instead of hairpinning out to the OCI gateway and back over
#     WireGuard.
#
# A DaemonSet is the correct primitive for a one-per-node hostNetwork proxy: its
# rolling update replaces a node's pod in place (delete-then-create), so the new
# pod never contends with the old for the privileged :443 bind. A Deployment
# with maxSurge deadlocks here — the surge pod cannot bind :443 while the old
# pod still holds it.
#
# hostNetwork / dnsPolicy are not native EnvoyProxy CRD fields (removed in
# v1.0.0, tracking issue: envoyproxy/gateway#1928). The official escape hatch is
# the StrategicMerge patch below. --base-id 1 is required because Cilium runs
# its own Envoy (cilium-envoy) in the host network namespace on every node; both
# default to base-id=0 and fight over the shared-memory domain socket
# (errno=98 EADDRINUSE on bind).
#
# useListenerPortAsContainerPort: true makes Envoy bind the Gateway's listener
# ports directly (80/443) instead of the default 10000-offset ports. Required
# for hostNetwork because there is no Service in front to remap ports.
# NET_BIND_SERVICE lets the envoy user bind ports <1024.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: instance-k8s-proxy
  namespace: envoy-gateway-system
spec:
  mergeGateways: true
  extraArgs:
    - --base-id
    - "1"
  provider:
    type: Kubernetes
    kubernetes:
      useListenerPortAsContainerPort: true
      envoyDaemonSet:
        pod:
          # Must stay schedulable on the over-committed OCI node — preempts
          # app-critical pods (e.g. argocd-controller) rather than losing its
          # :443 bind. See priorityclass.yaml.
          priorityClassName: envoy-gateway-critical
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: In
                        values:
                          - instance-k8s-proxy
                          - shion-ubuntu-2505
                          - shion-ubuntu-2605
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
        container:
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
        patch:
          type: StrategicMerge
          value:
            spec:
              template:
                spec:
                  hostNetwork: true
                  dnsPolicy: ClusterFirstWithHostNet
                  containers:
                    - name: envoy
                      # Run envoy as root (UID 0) so it can bind privileged
                      # ports 80/443 under hostNetwork. The distroless envoy
                      # binary has no file capabilities (`setcap`) baked in,
                      # so passing NET_BIND_SERVICE via capabilities.add is a
                      # no-op for non-root users — the kernel clears
                      # permitted/effective sets on exec. capabilities.drop
                      # ALL keeps the privilege surface narrow even as root.
                      securityContext:
                        runAsUser: 0
                        runAsGroup: 0
                        runAsNonRoot: false
                        capabilities:
                          add:
                            - NET_BIND_SERVICE
      envoyService:
        # Pod uses hostNetwork so the Service is informational only.
        type: ClusterIP
