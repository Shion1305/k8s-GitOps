# External Gateway: publicly reachable via 141.147.189.36 (instance-k8s-proxy).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: external
  namespace: envoy-gateway-system
spec:
  gatewayClassName: envoy-default
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-shion1305-com-tls
      allowedRoutes:
        namespaces:
          from: All
    # Legacy *.k.shion1305.com listener — exists solely to terminate TLS for
    # 308-redirect HTTPRoutes that move old URLs to their *.shion1305.com
    # equivalents during the ingress-nginx → Gateway migration. Once all
    # consumers are migrated and the legacy ingress-nginx subdomain is
    # decommissioned, this listener (and the matching cert) can be removed.
    - name: https-legacy-k
      port: 443
      protocol: HTTPS
      hostname: "*.k.shion1305.com"
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-k-shion1305-com-tls
      allowedRoutes:
        namespaces:
          from: All
